schema_version: 1
purpose: Preserve existing canonical mechanisms before governed rule-registry migration.
mechanisms:
- id: summary-renderer
  status: active
  owner: communication-governance
  category: communication
  priority: 1
  enforcement_phase: runtime
  conflict_domains:
  - summary-output-contract
  sources:
  - path: src/agentic_project_kit/run_summary_renderer.py
    required_terms:
    - validate_rendered_summary_text
    - terminal_log_remote
  - path: src/agentic_project_kit/run_summary_renderer.py
    required_terms:
    - VALID_REMOTE_EVIDENCE_RESULTS
    - VALID_CHAT_REPLIES
    - validate_rendered_summary_text
    - LEGACY_SUMMARY_TOKENS
    - terminal_log_remote
  - path: tests/test_run_summary_renderer.py
    required_terms:
    - remote_evidence
    - CHAT_REPLY
  protected_rule_intent: Canonical structured summary rendering and validation.
  surfaces:
  - agentic-kit-cli
  - summary-renderer
  - summary-tests
  tests:
  - tests/test_run_summary_renderer.py
- id: execution-mode-switch
  status: active
  owner: execution-governance
  category: execution
  priority: 2
  enforcement_phase: runtime
  conflict_domains:
  - execution-mode-state
  sources:
  - path: src/agentic_project_kit/cli_commands/state.py
    required_terms:
    - mode_check
    - mode_write
  - path: src/agentic_project_kit/cli_commands/state.py
    required_terms:
    - mode_check
    - mode_write
    - local
    - remote
  - path: src/agentic_project_kit/execution_mode_state.py
    required_terms:
    - LOCAL_READY
    - REMOTE_READY
    - DIRTY_LOCAL_BLOCKED
    - MODE_SWITCH_BLOCKED
  protected_rule_intent: Explicit local versus remote execution-mode checks and switching.
  surfaces:
  - agentic-kit-cli
  - execution-mode-state
  - state-cli
  tests:
  - tests/test_execution_mode_state.py
- id: rule-preservation-guard
  status: active
  owner: rule-governance
  category: governance
  priority: 1
  enforcement_phase: guard
  conflict_domains:
  - rule-preservation
  sources:
  - path: .agentic/rule_preservation.yaml
    required_terms:
    - structured-summary-must-be-enforced
    - no-copy-terminal-evidence
    - remote-log-lookup-first
    - yaml-structured-mutation-only
    - control-file-preservation
  - path: src/agentic_project_kit/rule_preservation.py
    required_terms:
    - validate_rule_preservation
    - required_terms
    - surfaces
    - RulePreservationFinding
  - path: tests/test_rule_preservation.py
    required_terms:
    - test_rule_preservation_current_repository_passes
    - missing_required_term
  protected_rule_intent: Preserve restored active workflow-rule anchors across required
    governance surfaces.
  surfaces:
  - rule-preservation-yaml
  - rule-preservation-validator
  - rule-preservation-tests
  tests:
  - tests/test_rule_preservation.py
- id: workflow-guard
  status: active
  owner: workflow-governance
  category: workflow
  priority: 1
  enforcement_phase: guard
  conflict_domains:
  - workflow-drift-guard
  sources:
  - path: src/agentic_project_kit/workflow_guard.py
    required_terms:
    - run_workflow_guard
    - protected_control_files
    - check_required_anchors
    - check_rule_registry
    - rule-registry-drift
    - rule-preservation-drift
  - path: tests/test_workflow_guard.py
    required_terms:
    - test_workflow_guard_passes_current_repository_state
    - test_workflow_guard_enforces_rule_registry
    - structured-summary-drift
  - path: docs/workflow/WORKFLOW_GUARD.md
    required_terms:
    - diagnose-and-fail
    - protected control files
    - repair plan
  protected_rule_intent: Diagnose recurring workflow drift as hard findings before
    state-changing work continues.
  surfaces:
  - workflow-guard-cli
  - workflow-guard-docs
  - workflow-guard-tests
  tests:
  - tests/test_workflow_guard.py
- id: patch-preflight
  status: active
  owner: patch-governance
  category: preflight
  priority: 1
  enforcement_phase: preflight
  conflict_domains:
  - patch-artifact-safety
  sources:
  - path: src/agentic_project_kit/patch_artifact_preflight.py
    required_terms:
    - run_preflight
    - check_rule_registry_files
    - GOVERNANCE_YAML_FILES
    - patch-preflight
    - validate_rule_registry
  - path: src/agentic_project_kit/protected_change_planner.py
    required_terms:
    - analyze_diff
    - LARGE_PROTECTED_REMOVAL_THRESHOLD
    - protected-anchor-removal-without-decision
  - path: tests/test_patch_artifact_preflight.py
    required_terms:
    - test_preflight_rule_registry_validation_passes_current_state
    - test_preflight_includes_rule_registry_files
    - test_preflight_full_runner_includes_governance_yaml
  - path: tests/test_protected_change_planner.py
    required_terms:
    - test_flags_large_rewrite_without_decision
    - test_accepts_large_rewrite_with_explicit_decision
  - path: src/agentic_project_kit/cli_commands/transfer_repo_pre_pr.py
    required_terms:
    - protected-diff-plan
    - protected_diff_plan
  protected_rule_intent: Block unsafe generated patch artifacts, broad protected-file
    replacements, anchor removal, and rule-registry drift before patch application.
  surfaces:
  - patch-preflight-cli
  - patch-preflight-validator
  - patch-preflight-tests
  - protected-change-planner-core
  - protected-change-planner-tests
  tests:
  - tests/test_patch_artifact_preflight.py
  - tests/test_protected_change_planner.py
- id: chat-communication-rules
  status: active
  owner: communication-governance
  category: communication
  priority: 2
  enforcement_phase: runtime
  conflict_domains:
  - chat-communication-contract
  sources:
  - path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
    required_terms:
    - User acknowledgements
    - paste-output
    - terminal log upload
    - remote evidence
  - path: docs/governance/FINAL_SUMMARY_CONTRACT.md
    required_terms:
    - No legacy handwritten summary fallback
    - terminal_log_remote
    - Remote log lookup rule
  - path: .agentic/compiled_agent_context.yaml
    required_terms:
    - chat-communication-contract
    - communication_rules
    - paste-output
  protected_rule_intent: Preserve d/f/w/paste-output semantics, no-copy evidence handling,
    and remote-log-first communication rules.
  surfaces:
  - chat-communication-contract
  - final-summary-contract
  - compiled-agent-context
  tests:
  - tests/test_chat_communication_contract.py
- id: chat-bootstrap-drift-rules
  status: active
  owner: chat-governance
  category: governance
  priority: 2
  enforcement_phase: guard
  conflict_domains:
  - chat-bootstrap-drift
  sources:
  - path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    required_terms:
    - Mandatory startup sequence
    - Remote repository connector route
    - Governance YAML mutation rule
    - Local repository freshness precondition
  - path: .agentic/compiled_agent_context.yaml
    required_terms:
    - chat-bootstrap-and-drift-contract
    - mandatory_successor_chat_sources
    - drift_detection
  protected_rule_intent: Preserve mandatory successor-chat bootstrap, drift detection,
    direct connector route, and structured YAML mutation rules.
  surfaces:
  - chat-bootstrap-contract
  - compiled-agent-context
  tests:
  - tests/test_chat_bootstrap_drift_contract.py
- id: portable-execution-rules
  status: active
  owner: execution-governance
  category: execution
  priority: 1
  enforcement_phase: runtime
  conflict_domains:
  - portable-execution-contract
  sources:
  - path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    required_terms:
    - shell commands are adapters only
    - Remote connector route rule
    - Governance YAML mutation rule
    - Evidence rule
  - path: .agentic/compiled_agent_context.yaml
    required_terms:
    - portable-chat-execution-contract
    - canonical_core
    - shell_role
  protected_rule_intent: Preserve Python-core-first portable execution and keep shell
    usage as an adapter, not canonical workflow logic.
  surfaces:
  - portable-execution-contract
  - compiled-agent-context
  tests:
  - tests/test_portable_execution_contract.py
- id: transfer-wrapper-command-layer
  status: active
  owner: workflow-governance
  category: execution
  priority: 1
  enforcement_phase: runtime
  conflict_domains:
  - transfer-wrapper-safety
  - command-reference-registry
  - gui-readiness
  sources:
  - path: docs/governance/COMMAND_REFERENCE_REGISTRY_CONTRACT.md
    required_terms:
    - Transfer wrapper command layer
    - agentic-kit transfer
    - bounded workflow entry points
    - GUI expansion
  - path: docs/planning/WORKFLOW_REDUCTION_FOCUS.md
    required_terms:
    - Completed wrapper set to audit before GUI expansion
    - transfer evidence-pr-complete
    - transfer work-order-patch
    - transfer protected-diff-plan
    - Pre-GUI Wrapper Registry Audit
    - GUI expansion
  - path: docs/reference/agentic-kit-commands.json
    required_terms:
    - agentic-kit transfer pr-create-complete
    - agentic-kit transfer evidence-pr-complete
    - agentic-kit transfer work-order-patch
    - agentic-kit transfer protected-diff-plan
  - path: tests/test_agentic_kit_command_reference_is_current.py
    required_terms:
    - generated_from_typer_click_registry
    - tests/test_agentic_kit_command_reference_is_current.py
  - path: .agentic/rule_mechanism_inventory.yaml
    required_terms:
    - transfer-wrapper-command-layer
    - command-reference-registry
    - gui-readiness
  - path: .agentic/rule_test_coverage.yaml
    required_terms:
    - transfer-wrapper-command-layer
    - transfer-wrapper-command-layer-registry-current
  - path: docs/planning/PROJECT_DIRECTION.yaml
    required_terms:
    - transfer-github-action-coverage
    - transfer
    - GitHub
  protected_rule_intent: Preserve the generated command reference and transfer-wrapper
    command layer as the canonical workflow surface for chat, transfer, evidence,
    and later GUI dispatch. GUI work must use bounded agentic-kit transfer wrappers
    rather than raw shell, raw git, raw GitHub, or manual evidence choreography.
  surfaces:
  - command-reference-registry
  - transfer-wrapper-cli
  - pre-gui-wrapper-roadmap
  - command-reference-tests
  - future-gui-dispatch
  - rule-mechanism-inventory
  - github-action-coverage
  tests:
  - tests/test_agentic_kit_command_reference_is_current.py
  - tests/test_rule_mechanism_inventory.py
  - tests/test_transfer_github_action_coverage.py
- id: evidence-guard
  status: active
  owner: evidence-governance
  category: governance
  priority: 3
  enforcement_phase: guard
  conflict_domains:
  - evidence-integrity
  sources:
  - path: src/agentic_project_kit/evidence_guard.py
    required_terms:
    - check_terminal_log
    - check_change_scope
    - FAIL_MARKERS
    - EXPECTED_NEGATIVE_SMOKE_MARKERS
    - EVIDENCE_LOG_PATTERNS
  - path: src/agentic_project_kit/cli_commands/evidence.py
    required_terms:
    - guard
    - scope-check
    - clean-check
    - check_terminal_log
    - check_change_scope
  - path: tests/test_evidence_guard.py
    required_terms:
    - test_evidence_guard_rejects_final_pass_after_failed_gate
    - test_evidence_guard_accepts_expected_negative_smoke_log
    - test_change_scope_guard_rejects_log_only_when_target_expected
    - test_evidence_scope_check_cli_rejects_log_only_target_miss
  protected_rule_intent: Reject contradictory terminal evidence and expected-target
    false success where evidence logs replace required product changes.
  surfaces:
  - evidence-guard-cli
  - evidence-scope-check-cli
  - evidence-guard-core
  - evidence-guard-tests
  tests:
  - tests/test_evidence_guard.py
- id: typed-work-order-runner
  status: active
  owner: execution-governance
  category: execution
  priority: 3
  enforcement_phase: runtime
  conflict_domains:
  - typed-work-order-execution
  sources:
  - path: src/agentic_project_kit/typed_work_order_runner.py
    required_terms:
    - parse_typed_work_order
    - run_typed_work_order
    - TypedWorkOrderResult
    - json.dumps
    - write_text
  - path: tests/test_typed_work_order_runner.py
    required_terms:
    - test_run_typed_work_order_pass_writes_machine_readable_log
    - test_run_typed_work_order_fail_stops_on_failed_step
    - test_unsupported_step_kind_is_hard_fail
  - path: src/agentic_project_kit/cli.py
    required_terms:
    - work_orders_app
    - work-order
  protected_rule_intent: Preserve typed, machine-readable work order execution logs
    and block command-step drift.
  surfaces:
  - typed-work-order-runner
  - work-order-cli
  - typed-work-order-tests
  tests:
  - tests/test_typed_work_order_runner.py
- id: release-state-validation
  status: active
  owner: release-governance
  category: workflow
  priority: 2
  enforcement_phase: guard
  conflict_domains:
  - release-state-validation
  sources:
  - path: src/agentic_project_kit/release.py
    required_terms:
    - build_release_state_report
    - ReleaseCheckStatus
    - check_remote_tag_absent
    - check_github_release_absent
  - path: src/agentic_project_kit/cli_commands/release.py
    required_terms:
    - release-check
    - release_check_command
    - build_release_state_report
  - path: tests/test_release.py
    required_terms:
    - test_build_release_state_report_passes_for_unused_version
    - test_build_release_state_report_fails_for_existing_remote_tag
    - test_build_release_state_report_fails_for_existing_github_release
  - path: docs/TEST_GATES.md
    required_terms:
    - Release state validation change
    - agentic-kit release-check CLI smoke command
  protected_rule_intent: Preserve release-state checks for version files, unused tags,
    and absent GitHub releases before release mutation.
  surfaces:
  - release-check-cli
  - release-state-core
  - release-tests
  - test-gates-docs
  tests:
  - tests/test_release.py
- id: post-release-archive-check
  status: active
  owner: release-governance
  category: workflow
  priority: 3
  enforcement_phase: guard
  conflict_domains:
  - post-release-archive-verification
  sources:
  - path: src/agentic_project_kit/post_release.py
    required_terms:
    - build_post_release_report
    - PostReleaseStatus
    - check_zenodo_version_record
    - leave README/CITATION unchanged
  - path: src/agentic_project_kit/cli_commands/release.py
    required_terms:
    - post-release-check
    - post_release_check_command
    - build_post_release_report
  - path: tests/test_post_release.py
    required_terms:
    - test_post_release_report_passes_with_github_release_and_verified_zenodo_record
    - test_post_release_report_waits_when_zenodo_record_is_not_available_yet
    - test_render_post_release_report_shows_waiting_as_non_failing
  - path: docs/TEST_GATES.md
    required_terms:
    - Post-release archive check
    - agentic-kit post-release-check CLI smoke command
  protected_rule_intent: Preserve post-release GitHub and Zenodo DOI verification
    and prevent premature README/CITATION DOI changes while Zenodo is waiting.
  surfaces:
  - post-release-check-cli
  - post-release-core
  - post-release-tests
  - test-gates-docs
  tests:
  - tests/test_post_release.py
- id: post-release-doi-closeout
  status: active
  owner: release-governance
  category: workflow
  priority: 3
  enforcement_phase: guard
  conflict_domains:
  - post-release-doi-metadata-closeout
  - release-doi-metadata-closeout
  sources:
  - path: src/agentic_project_kit/post_release_closeout.py
    required_terms:
    - post_release_doi_closeout
    - render_post_release_doi_closeout_result
    - zenodo_version_doi_not_verified
    - Dry run passed; rerun with --write to update DOI metadata.
  - path: src/agentic_project_kit/cli_commands/release.py
    required_terms:
    - post-release-doi-closeout
    - post_release_doi_closeout_command
  - path: tests/test_post_release.py
    required_terms:
    - test_post_release_doi_closeout_blocks_when_zenodo_is_waiting
    - test_post_release_doi_closeout_dry_run_reports_metadata_paths
    - test_post_release_doi_closeout_write_updates_metadata_files
  protected_rule_intent: Preserve guarded post-release DOI metadata closeout after GitHub Release and Zenodo version DOI verification pass.
  surfaces:
  - post-release-doi-closeout-cli
  - post-release-doi-closeout-core
  - post-release-tests
  tests:
  - tests/test_post_release.py
- id: transfer-safety-rules
  status: active
  owner: execution-governance
  category: governance
  priority: 1
  enforcement_phase: guard
  conflict_domains:
  - transfer-boundary
  - generated-python-patch-safety
  - local-to-llm-outbox
  sources:
  - path: .agentic/transfer_safety_rules.yaml
    required_terms:
    - raw_newline_in_python_string_literals
    - python_transfer_txt_suffix_not_syntax_validated
    - wrong_branch_execution
    - changed_python_files_must_compile_before_cli_import
  - path: src/agentic_project_kit/transfer_safety_context.py
    required_terms:
    - build_transfer_safety_header
    - write_transfer_outbox
    - OUTBOX_LAST_RESULT
  - path: src/agentic_project_kit/transfer_uplink.py
    required_terms:
    - write_transfer_outbox
    - run_and_log_transfer_command
    - run_and_log_transfer_sequence
  - path: tests/test_transfer_safety_context.py
    required_terms:
    - test_transfer_safety_header_contains_known_failure_classes
    - test_transfer_outbox_is_json_with_safety_header
  protected_rule_intent: Preserve machine-readable transfer safety rules and deterministic
    local-to-LLM outbox headers so recurring generated patch and transfer drift is
    visible before follow-up work.
  surfaces:
  - transfer-safety-rules-yaml
  - transfer-safety-context
  - transfer-outbox-header
  - transfer-safety-tests
  tests:
  - tests/test_transfer_safety_context.py
  - tests/test_transfer_uplink.py
