schema_version: 1
purpose: Preserve existing canonical mechanisms before governed rule-registry migration.
mechanisms:
  - id: summary-renderer
    status: active
    category: communication
    priority: 1
    enforcement_phase: runtime
    sources:
      - path: ./ns
        required_terms: [run_summary_renderer, summary]
      - path: src/agentic_project_kit/run_summary_renderer.py
        required_terms: [VALID_REMOTE_EVIDENCE_RESULTS, VALID_CHAT_REPLIES, validate_rendered_summary_text, LEGACY_SUMMARY_TOKENS, terminal_log_remote]
      - path: tests/test_run_summary_renderer.py
        required_terms: [remote_evidence, CHAT_REPLY]
    protected_rule_intent: Canonical structured summary rendering and validation.
  - id: execution-mode-switch
    status: active
    category: execution
    priority: 2
    enforcement_phase: runtime
    sources:
      - path: ./ns
        required_terms: [mode-check, mode-write]
      - path: src/agentic_project_kit/cli_commands/state.py
        required_terms: [mode_check, mode_write, local, remote]
      - path: src/agentic_project_kit/execution_mode_state.py
        required_terms: [LOCAL_READY, REMOTE_READY, DIRTY_LOCAL_BLOCKED, MODE_SWITCH_BLOCKED]
    protected_rule_intent: Explicit local versus remote execution-mode checks and switching.
  - id: rule-preservation-guard
    status: active
    category: governance
    priority: 1
    enforcement_phase: guard
    sources:
      - path: .agentic/rule_preservation.yaml
        required_terms: [structured-summary-must-be-enforced, no-copy-terminal-evidence, remote-log-lookup-first, yaml-structured-mutation-only, control-file-preservation]
      - path: src/agentic_project_kit/rule_preservation.py
        required_terms: [validate_rule_preservation, required_terms, surfaces, RulePreservationFinding]
      - path: tests/test_rule_preservation.py
        required_terms: [test_rule_preservation_current_repository_passes, missing_required_term]
    protected_rule_intent: Preserve restored active workflow-rule anchors across required governance surfaces.
  - id: workflow-guard
    status: active
    category: workflow
    priority: 1
    enforcement_phase: guard
    sources:
      - path: src/agentic_project_kit/workflow_guard.py
        required_terms: [run_workflow_guard, protected_control_files, check_required_anchors, check_rule_registry, rule-registry-drift, rule-preservation-drift]
      - path: tests/test_workflow_guard.py
        required_terms: [test_workflow_guard_passes_current_repository_state, test_workflow_guard_enforces_rule_registry, structured-summary-drift]
      - path: docs/workflow/WORKFLOW_GUARD.md
        required_terms: [diagnose-and-fail, protected control files, repair plan]
    protected_rule_intent: Diagnose recurring workflow drift as hard findings before state-changing work continues.
  - id: patch-preflight
    status: active
    category: preflight
    priority: 1
    enforcement_phase: preflight
    sources:
      - path: src/agentic_project_kit/patch_artifact_preflight.py
        required_terms: [run_preflight, check_rule_registry_files, GOVERNANCE_YAML_FILES, patch-preflight, validate_rule_registry]
      - path: tests/test_patch_artifact_preflight.py
        required_terms: [test_preflight_rule_registry_validation_passes_current_state, test_preflight_includes_rule_registry_files, test_preflight_full_runner_includes_governance_yaml]
      - path: ./ns
        required_terms: [patch-preflight, agentic_project_kit.cli]
    protected_rule_intent: Block unsafe generated patch artifacts and rule-registry drift before patch application.
  - id: chat-communication-rules
    status: active
    category: communication
    priority: 2
    enforcement_phase: runtime
    sources:
      - path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
        required_terms: [User acknowledgements, paste-output, terminal log upload, remote evidence]
      - path: docs/governance/FINAL_SUMMARY_CONTRACT.md
        required_terms: [No legacy handwritten summary fallback, terminal_log_remote, Remote log lookup rule]
      - path: .agentic/compiled_agent_context.yaml
        required_terms: [chat-communication-contract, communication_rules, paste-output]
    protected_rule_intent: Preserve d/f/w/paste-output semantics, no-copy evidence handling, and remote-log-first communication rules.
  - id: chat-bootstrap-drift-rules
    status: active
    category: governance
    priority: 2
    enforcement_phase: guard
    sources:
      - path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
        required_terms: [Mandatory startup sequence, Remote repository connector route, Governance YAML mutation rule, Local repository freshness precondition]
      - path: .agentic/compiled_agent_context.yaml
        required_terms: [chat-bootstrap-and-drift-contract, mandatory_successor_chat_sources, drift_detection]
    protected_rule_intent: Preserve mandatory successor-chat bootstrap, drift detection, direct connector route, and structured YAML mutation rules.
  - id: portable-execution-rules
    status: active
    category: execution
    priority: 1
    enforcement_phase: runtime
    sources:
      - path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
        required_terms: [shell commands are adapters only, Remote connector route rule, Governance YAML mutation rule, Evidence rule]
      - path: .agentic/compiled_agent_context.yaml
        required_terms: [portable-chat-execution-contract, canonical_core, shell_role]
    protected_rule_intent: Preserve Python-core-first portable execution and keep shell usage as an adapter, not canonical workflow logic.
