schema_version: 1
purpose: Inventory existing canonical mechanisms that must be preserved before governed rule-registry migration.
mechanisms:
  - id: summary-renderer
    status: active
    kind: summary
    commands: ['./ns summary']
    sources:
      - path: ./ns
        required_terms: ['run_summary_renderer', 'summary')]
      - path: src/agentic_project_kit/run_summary_renderer.py
        required_terms: ['VALID_REMOTE_EVIDENCE_RESULTS', 'VALID_CHAT_REPLIES', 'validate_rendered_summary_text', 'LEGACY_SUMMARY_TOKENS']
      - path: tests/test_run_summary_renderer.py
        required_terms: ['remote_evidence', 'CHAT_REPLY', 'LEGACY_SUMMARY_TOKENS']
    protected_rule_intent: canonical structured summary rendering and validation
  - id: execution-mode-switch
    status: active
    kind: execution-mode
    commands: ['./ns mode-check', './ns mode-write']
    sources:
      - path: ./ns
        required_terms: ['mode-check', 'mode-write']
      - path: src/agentic_project_kit/cli_commands/state.py
        required_terms: ['mode_check', 'mode_write', 'local', 'remote']
      - path: src/agentic_project_kit/execution_mode_state.py
        required_terms: ['LOCAL_READY', 'REMOTE_READY', 'DIRTY_LOCAL_BLOCKED', 'MODE_SWITCH_BLOCKED']
    protected_rule_intent: explicit local versus remote execution-mode checks and switching
  - id: no-copy-evidence-handoff
    status: active
    kind: evidence
    commands: ['./ns summary']
    sources:
      - path: src/agentic_project_kit/run_summary_renderer.py
        required_terms: ['terminal_log_remote', 'docs/reports/terminal', 'VALID_REMOTE_EVIDENCE_RESULTS']
      - path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
        required_terms: ['terminal_log_remote', 'CHAT_REPLY']
    protected_rule_intent: repo-backed evidence before manual paste except unavailable or unusable evidence
