schema_version: 1
policy_id: no-copy-terminal-evidence
status: active
purpose: Require repo-backed evidence for terminal runs so normal workflow does not depend on chat copy-and-paste.
rules:
  - id: full-output-log-required
    status: active
    requirement: Every relevant terminal action must produce a durable log file under docs/reports/terminal or docs/reports/command_runs.
  - id: d-means-log-backed-pass
    status: active
    requirement: The user response d is valid only after a PASS result whose relevant evidence was written to a repo-backed log or report.
  - id: no-unconditional-pass
    status: active
    requirement: Terminal actions must not print PASS after a failed required command.
  - id: manual-copy-only-on-failure
    status: active
    requirement: Manual copy-and-paste of terminal output is reserved for FAIL, broken logging, aborted process, terminal loss, or unavailable pushed evidence.
  - id: obsolete-rules-must-not-accumulate
    status: active
    requirement: If system improvements replace a workaround, the old instruction must be removed from active handoff text or marked superseded or historical.
exceptions:
  - fail
  - logging-failure
  - process-abort
  - terminal-loss
  - kill-9
  - pushed-evidence-unavailable
handoff_integration:
  persistent_handoff_state_must_include_policy: true
  generated_handoff_prompt_must_not_request_copy_paste_on_pass: true

mandatory_remote_evidence_contract:
  requirement: "Long-running local workflows must finalize terminal evidence into committed and pushed repo artifacts before telling the user that no copy-and-paste is needed."
  failure_rule: "If the final summary cannot prove REMOTE_EVIDENCE: PASS, the user must be told that paste-output is still required."
  self_modifying_log_rule: "A terminal log must not be written again after it has been committed as final evidence."

mandatory_final_summary_contract:
  requirement: "Every relevant terminal work block must end with the exact SUMMARY block containing WORK RESULT, EVIDENCE RESULT, OVERALL RESULT, REMOTE_EVIDENCE, terminal_log, command_report, NEXT_CHAT_REPLY, and the final result marker."
  pass_rule: "A final PASS is allowed only when WORK RESULT and OVERALL RESULT are PASS and required remote evidence is PASS."
  fail_rule: "A previous inner FAIL or HARD-FAIL must not be relabeled as OVERALL RESULT: PASS by later log commit, push, or cleanup."
  evidence_rule: "Successful evidence preservation can produce EVIDENCE RESULT: PASS while WORK RESULT and OVERALL RESULT remain FAIL."
  next_reply_rule: "NEXT_CHAT_REPLY: p is allowed only when OVERALL RESULT: PASS and REMOTE_EVIDENCE: PASS."
