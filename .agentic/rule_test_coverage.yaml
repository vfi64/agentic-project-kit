schema_version: 1
purpose: Classify rule mechanism test coverage without silently accepting unclassified empty test lists.
coverage:
- mechanism_id: summary-renderer
  test_coverage: direct
  assertions:
  - canonical structured summary rendering is validated
  - legacy handwritten summary fallback is rejected
- mechanism_id: execution-mode-switch
  test_coverage: documented
  coverage_rationale: Source and CLI anchors are preserved, but no direct mechanism-level regression test is registered yet.
  assertions:
  - execution mode source anchors are preserved
  - local versus remote mode switching remains visible in CLI surfaces
- mechanism_id: rule-preservation-guard
  test_coverage: direct
  assertions:
  - required rule anchors are preserved across governance surfaces
  - missing required terms produce rule-preservation findings
- mechanism_id: workflow-guard
  test_coverage: direct
  assertions:
  - workflow guard passes current repository state
  - registry drift and required registry file loss are hard findings
- mechanism_id: patch-preflight
  test_coverage: direct
  assertions:
  - preflight validates governance YAML files
  - preflight includes rule registry files before patch application
- mechanism_id: chat-communication-rules
  test_coverage: documented
  coverage_rationale: Contract and compiled-context anchors are preserved; direct behavioral tests are not registered for this documentation rule yet.
  assertions:
  - d f w paste-output semantics remain documented
  - remote-log-first evidence handling remains anchored
- mechanism_id: chat-bootstrap-drift-rules
  test_coverage: documented
  coverage_rationale: Contract and compiled-context anchors are preserved; direct behavioral tests are not registered for this documentation rule yet.
  assertions:
  - mandatory successor-chat bootstrap remains documented
  - drift response and remote connector rules remain anchored
- mechanism_id: portable-execution-rules
  test_coverage: documented
  coverage_rationale: Contract and compiled-context anchors are preserved; direct behavioral tests are not registered for this documentation rule yet.
  assertions:
  - Python core remains canonical over shell adapters
  - governance YAML mutation rules remain anchored
- mechanism_id: evidence-guard
  test_coverage: direct
  assertions:
  - contradictory PASS evidence with failed gate markers is rejected
  - expected negative smoke markers are accepted only when classified
- mechanism_id: typed-work-order-runner
  test_coverage: direct
  assertions:
  - typed work orders write machine-readable logs
  - unsupported step kinds hard-fail deterministically
- mechanism_id: release-state-validation
  test_coverage: direct
  assertions:
  - unused release versions pass release-state checks
  - existing remote tags and releases fail before mutation
- mechanism_id: post-release-archive-check
  test_coverage: direct
  assertions:
  - GitHub release and Zenodo records are verified after release
  - waiting Zenodo records are non-failing until available
