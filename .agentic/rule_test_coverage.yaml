schema_version: 1
purpose: Classify rule mechanism test coverage without silently accepting unclassified empty test lists.
coverage:
- mechanism_id: summary-renderer
  test_coverage: direct
  assertions:
  - assertion_id: summary-renderer-canonical-output
    kind: behavior
    covered_surfaces:
    - summary-renderer
    - summary-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/run_summary_renderer.py
    - kind: test
      path: tests/test_run_summary_renderer.py
    statement: canonical structured summary rendering is validated
  - assertion_id: summary-renderer-legacy-rejection
    kind: negative-case
    covered_surfaces:
    - summary-tests
    evidence_refs:
    - kind: test
      path: tests/test_run_summary_renderer.py
    statement: legacy handwritten summary fallback is rejected
- mechanism_id: execution-mode-switch
  test_coverage: direct
  assertions:
  - assertion_id: execution-mode-switch-local-ready
    kind: behavior
    covered_surfaces:
    - execution-mode-state
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/execution_mode_state.py
    - kind: test
      path: tests/test_execution_mode_state.py
    statement: local execution mode readiness checks branch cleanliness, required tools, and venv availability
  - assertion_id: execution-mode-switch-remote-ready
    kind: behavior
    covered_surfaces:
    - execution-mode-state
    - state-cli
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/execution_mode_state.py
    - kind: source
      path: src/agentic_project_kit/cli_commands/state.py
    - kind: test
      path: tests/test_execution_mode_state.py
    statement: remote execution mode readiness remains distinct from local tooling requirements
  - assertion_id: execution-mode-switch-blocked-states
    kind: negative-case
    covered_surfaces:
    - execution-mode-state
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/execution_mode_state.py
    - kind: test
      path: tests/test_execution_mode_state.py
    statement: dirty worktrees, missing tooling, and branch mismatches produce deterministic blocked states
- mechanism_id: rule-preservation-guard
  test_coverage: direct
  assertions:
  - assertion_id: rule-preservation-guard-anchor-coverage
    kind: guard
    covered_surfaces:
    - rule-preservation-yaml
    - rule-preservation-validator
    - rule-preservation-tests
    evidence_refs:
    - kind: source
      path: .agentic/rule_preservation.yaml
    - kind: test
      path: tests/test_rule_preservation.py
    statement: required rule anchors are preserved across governance surfaces
  - assertion_id: rule-preservation-guard-missing-term
    kind: negative-case
    covered_surfaces:
    - rule-preservation-tests
    evidence_refs:
    - kind: test
      path: tests/test_rule_preservation.py
    statement: missing required terms produce rule-preservation findings
- mechanism_id: workflow-guard
  test_coverage: direct
  assertions:
  - assertion_id: workflow-guard-current-state
    kind: guard
    covered_surfaces:
    - workflow-guard-cli
    - workflow-guard-tests
    evidence_refs:
    - kind: test
      path: tests/test_workflow_guard.py
    statement: workflow guard passes current repository state
  - assertion_id: workflow-guard-registry-loss
    kind: negative-case
    covered_surfaces:
    - workflow-guard-tests
    evidence_refs:
    - kind: test
      path: tests/test_workflow_guard.py
    statement: registry drift and required registry file loss are hard findings
- mechanism_id: patch-preflight
  test_coverage: direct
  assertions:
  - assertion_id: patch-preflight-governance-yaml
    kind: guard
    covered_surfaces:
    - patch-preflight-validator
    - patch-preflight-tests
    evidence_refs:
    - kind: test
      path: tests/test_patch_artifact_preflight.py
    statement: preflight validates governance YAML files
  - assertion_id: patch-preflight-registry-files
    kind: guard
    covered_surfaces:
    - patch-preflight-validator
    - patch-preflight-tests
    evidence_refs:
    - kind: test
      path: tests/test_patch_artifact_preflight.py
    statement: preflight includes rule registry files before patch application
- mechanism_id: chat-communication-rules
  test_coverage: documented
  coverage_rationale: Contract and compiled-context anchors are preserved; direct behavioral tests are not registered for this documentation rule yet.
  assertions:
  - assertion_id: chat-communication-rules-ack-semantics
    kind: anchor
    covered_surfaces:
    - chat-communication-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    statement: d f w paste-output semantics remain documented
  - assertion_id: chat-communication-rules-remote-log-first
    kind: evidence
    covered_surfaces:
    - final-summary-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/FINAL_SUMMARY_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    statement: remote-log-first evidence handling remains anchored
- mechanism_id: chat-bootstrap-drift-rules
  test_coverage: documented
  coverage_rationale: Contract and compiled-context anchors are preserved; direct behavioral tests are not registered for this documentation rule yet.
  assertions:
  - assertion_id: chat-bootstrap-drift-rules-mandatory-sources
    kind: anchor
    covered_surfaces:
    - chat-bootstrap-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    statement: mandatory successor-chat bootstrap remains documented
  - assertion_id: chat-bootstrap-drift-rules-drift-response
    kind: workflow
    covered_surfaces:
    - chat-bootstrap-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    statement: drift response and remote connector rules remain anchored
- mechanism_id: portable-execution-rules
  test_coverage: documented
  coverage_rationale: Contract and compiled-context anchors are preserved; direct behavioral tests are not registered for this documentation rule yet.
  assertions:
  - assertion_id: portable-execution-rules-python-core
    kind: workflow
    covered_surfaces:
    - portable-execution-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    statement: Python core remains canonical over shell adapters
  - assertion_id: portable-execution-rules-yaml-mutation
    kind: anchor
    covered_surfaces:
    - portable-execution-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    statement: governance YAML mutation rules remain anchored
- mechanism_id: evidence-guard
  test_coverage: direct
  assertions:
  - assertion_id: evidence-guard-contradictory-pass
    kind: negative-case
    covered_surfaces:
    - evidence-guard-core
    - evidence-guard-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/evidence_guard.py
    - kind: test
      path: tests/test_evidence_guard.py
    statement: contradictory PASS evidence with failed gate markers is rejected
  - assertion_id: evidence-guard-negative-smoke
    kind: evidence
    covered_surfaces:
    - evidence-guard-core
    - evidence-guard-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/evidence_guard.py
    - kind: test
      path: tests/test_evidence_guard.py
    statement: expected negative smoke markers are accepted only when classified
- mechanism_id: typed-work-order-runner
  test_coverage: direct
  assertions:
  - assertion_id: typed-work-order-runner-machine-log
    kind: artifact
    covered_surfaces:
    - typed-work-order-runner
    - typed-work-order-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/typed_work_order_runner.py
    - kind: test
      path: tests/test_typed_work_order_runner.py
    statement: typed work orders write machine-readable logs
  - assertion_id: typed-work-order-runner-unsupported-step
    kind: negative-case
    covered_surfaces:
    - typed-work-order-runner
    - typed-work-order-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/typed_work_order_runner.py
    - kind: test
      path: tests/test_typed_work_order_runner.py
    statement: unsupported step kinds hard-fail deterministically
- mechanism_id: release-state-validation
  test_coverage: direct
  assertions:
  - assertion_id: release-state-validation-unused-version
    kind: release
    covered_surfaces:
    - release-check-cli
    - release-state-core
    - release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/release.py
    - kind: test
      path: tests/test_release.py
    statement: unused release versions pass release-state checks
  - assertion_id: release-state-validation-existing-remote
    kind: negative-case
    covered_surfaces:
    - release-check-cli
    - release-state-core
    - release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/release.py
    - kind: test
      path: tests/test_release.py
    statement: existing remote tags and releases fail before mutation
- mechanism_id: post-release-archive-check
  test_coverage: direct
  assertions:
  - assertion_id: post-release-archive-check-verification
    kind: release
    covered_surfaces:
    - post-release-check-cli
    - post-release-core
    - post-release-tests
    - test-gates-docs
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/post_release.py
    - kind: test
      path: tests/test_post_release.py
    statement: GitHub release and Zenodo records are verified after release
  - assertion_id: post-release-archive-check-zenodo-waiting
    kind: workflow
    covered_surfaces:
    - post-release-check-cli
    - post-release-core
    - post-release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/post_release.py
    - kind: test
      path: tests/test_post_release.py
    statement: waiting Zenodo records are non-failing until available
