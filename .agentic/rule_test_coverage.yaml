schema_version: 1
purpose: Classify rule mechanism test coverage without silently accepting unclassified
  empty test lists.
coverage:
- mechanism_id: summary-renderer
  test_coverage: direct
  assertions:
  - assertion_id: summary-renderer-canonical-output
    kind: behavior
    covered_surfaces:
    - summary-renderer
    - summary-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/run_summary_renderer.py
    - kind: test
      path: tests/test_run_summary_renderer.py
    statement: canonical structured summary rendering is validated
  - assertion_id: summary-renderer-legacy-rejection
    kind: negative-case
    covered_surfaces:
    - summary-tests
    evidence_refs:
    - kind: test
      path: tests/test_run_summary_renderer.py
    statement: legacy handwritten summary fallback is rejected
- mechanism_id: execution-mode-switch
  test_coverage: direct
  assertions:
  - assertion_id: execution-mode-switch-local-ready
    kind: behavior
    covered_surfaces:
    - execution-mode-state
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/execution_mode_state.py
    - kind: test
      path: tests/test_execution_mode_state.py
    statement: local execution mode readiness checks branch cleanliness, required
      tools, and venv availability
  - assertion_id: execution-mode-switch-remote-ready
    kind: behavior
    covered_surfaces:
    - execution-mode-state
    - state-cli
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/execution_mode_state.py
    - kind: source
      path: src/agentic_project_kit/cli_commands/state.py
    - kind: test
      path: tests/test_execution_mode_state.py
    statement: remote execution mode readiness remains distinct from local tooling
      requirements
  - assertion_id: execution-mode-switch-blocked-states
    kind: negative-case
    covered_surfaces:
    - execution-mode-state
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/execution_mode_state.py
    - kind: test
      path: tests/test_execution_mode_state.py
    statement: dirty worktrees, missing tooling, and branch mismatches produce deterministic
      blocked states
- mechanism_id: rule-preservation-guard
  test_coverage: direct
  assertions:
  - assertion_id: rule-preservation-guard-anchor-coverage
    kind: guard
    covered_surfaces:
    - rule-preservation-yaml
    - rule-preservation-validator
    - rule-preservation-tests
    evidence_refs:
    - kind: source
      path: .agentic/rule_preservation.yaml
    - kind: test
      path: tests/test_rule_preservation.py
    statement: required rule anchors are preserved across governance surfaces
  - assertion_id: rule-preservation-guard-missing-term
    kind: negative-case
    covered_surfaces:
    - rule-preservation-tests
    evidence_refs:
    - kind: test
      path: tests/test_rule_preservation.py
    statement: missing required terms produce rule-preservation findings
- mechanism_id: workflow-guard
  test_coverage: direct
  assertions:
  - assertion_id: workflow-guard-current-state
    kind: guard
    covered_surfaces:
    - workflow-guard-cli
    - workflow-guard-tests
    evidence_refs:
    - kind: test
      path: tests/test_workflow_guard.py
    statement: workflow guard passes current repository state
  - assertion_id: workflow-guard-registry-loss
    kind: negative-case
    covered_surfaces:
    - workflow-guard-tests
    evidence_refs:
    - kind: test
      path: tests/test_workflow_guard.py
    statement: registry drift and required registry file loss are hard findings
- mechanism_id: patch-preflight
  test_coverage: direct
  assertions:
  - assertion_id: patch-preflight-governance-yaml
    kind: guard
    covered_surfaces:
    - patch-preflight-validator
    - patch-preflight-tests
    evidence_refs:
    - kind: test
      path: tests/test_patch_artifact_preflight.py
    statement: preflight validates governance YAML files
  - assertion_id: patch-preflight-registry-files
    kind: guard
    covered_surfaces:
    - patch-preflight-validator
    - patch-preflight-tests
    evidence_refs:
    - kind: test
      path: tests/test_patch_artifact_preflight.py
    statement: preflight includes rule registry files before patch application
- mechanism_id: chat-communication-rules
  test_coverage: direct
  assertions:
  - assertion_id: chat-communication-rules-ack-semantics
    kind: behavior
    covered_surfaces:
    - chat-communication-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    - kind: test
      path: tests/test_chat_communication_contract.py
    statement: d f w paste-output and stop semantics are direct-tested as control
      signals rather than evidence
  - assertion_id: chat-communication-rules-remote-log-first
    kind: evidence
    covered_surfaces:
    - chat-communication-contract
    - final-summary-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
    - kind: source
      path: docs/governance/FINAL_SUMMARY_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    - kind: test
      path: tests/test_chat_communication_contract.py
    statement: failure recovery and remote-log-first handling are direct-tested against
      governance contracts
  - assertion_id: chat-communication-rules-pass-boundary
    kind: guard
    covered_surfaces:
    - chat-communication-contract
    - final-summary-contract
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
    - kind: source
      path: docs/governance/FINAL_SUMMARY_CONTRACT.md
    - kind: test
      path: tests/test_chat_communication_contract.py
    statement: PASS claims require matching work, gates, evidence, canonical renderer
      use, and no overwritten inner FAIL
- mechanism_id: chat-bootstrap-drift-rules
  test_coverage: direct
  assertions:
  - assertion_id: chat-bootstrap-drift-rules-mandatory-startup
    kind: guard
    covered_surfaces:
    - chat-bootstrap-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    - kind: test
      path: tests/test_chat_bootstrap_drift_contract.py
    statement: successor chats must read mandatory sources before proposing mutation
      and must not replace source-reading with memory
  - assertion_id: chat-bootstrap-drift-rules-remote-connector-route
    kind: workflow
    covered_surfaces:
    - chat-bootstrap-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    - kind: test
      path: tests/test_chat_bootstrap_drift_contract.py
    statement: remote work must use the GitHub connector direct-path-first route before
      search, raw URLs, or local shell fallbacks
  - assertion_id: chat-bootstrap-drift-rules-drift-response
    kind: negative-case
    covered_surfaces:
    - chat-bootstrap-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    - kind: test
      path: tests/test_chat_bootstrap_drift_contract.py
    statement: drift classes and drift responses are direct-tested and must not be
      hidden behind final PASS
  - assertion_id: chat-bootstrap-drift-rules-yaml-and-handoff-boundary
    kind: guard
    covered_surfaces:
    - chat-bootstrap-contract
    evidence_refs:
    - kind: source
      path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - kind: test
      path: tests/test_chat_bootstrap_drift_contract.py
    statement: governance YAML mutation and drift handoff requirements are direct-tested
- mechanism_id: portable-execution-rules
  test_coverage: direct
  assertions:
  - assertion_id: portable-execution-rules-python-core
    kind: workflow
    covered_surfaces:
    - portable-execution-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    - kind: test
      path: tests/test_portable_execution_contract.py
    statement: Python modules and CLI commands remain canonical while shell commands
      stay adapters only
  - assertion_id: portable-execution-rules-yaml-mutation
    kind: guard
    covered_surfaces:
    - portable-execution-contract
    - compiled-agent-context
    evidence_refs:
    - kind: source
      path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    - kind: source
      path: .agentic/compiled_agent_context.yaml
    - kind: test
      path: tests/test_portable_execution_contract.py
    statement: governance YAML mutation must use parse-modify-dump instead of manual
      indentation or string concatenation
  - assertion_id: portable-execution-rules-evidence-boundary
    kind: evidence
    covered_surfaces:
    - portable-execution-contract
    evidence_refs:
    - kind: source
      path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    - kind: test
      path: tests/test_portable_execution_contract.py
    statement: evidence generation and chat terminal blocks remain bounded by portable
      Python-first rules
- mechanism_id: evidence-guard
  test_coverage: direct
  assertions:
  - assertion_id: evidence-guard-contradictory-pass
    kind: negative-case
    covered_surfaces:
    - evidence-guard-core
    - evidence-guard-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/evidence_guard.py
    - kind: test
      path: tests/test_evidence_guard.py
    statement: contradictory PASS evidence with failed gate markers is rejected
  - assertion_id: evidence-guard-negative-smoke
    kind: evidence
    covered_surfaces:
    - evidence-guard-core
    - evidence-guard-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/evidence_guard.py
    - kind: test
      path: tests/test_evidence_guard.py
    statement: expected negative smoke markers are accepted only when classified
- mechanism_id: typed-work-order-runner
  test_coverage: direct
  assertions:
  - assertion_id: typed-work-order-runner-machine-log
    kind: artifact
    covered_surfaces:
    - typed-work-order-runner
    - typed-work-order-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/typed_work_order_runner.py
    - kind: test
      path: tests/test_typed_work_order_runner.py
    statement: typed work orders write machine-readable logs
  - assertion_id: typed-work-order-runner-unsupported-step
    kind: negative-case
    covered_surfaces:
    - typed-work-order-runner
    - typed-work-order-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/typed_work_order_runner.py
    - kind: test
      path: tests/test_typed_work_order_runner.py
    statement: unsupported step kinds hard-fail deterministically
- mechanism_id: release-state-validation
  test_coverage: direct
  assertions:
  - assertion_id: release-state-validation-unused-version
    kind: release
    covered_surfaces:
    - release-check-cli
    - release-state-core
    - release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/release.py
    - kind: test
      path: tests/test_release.py
    statement: unused release versions pass release-state checks
  - assertion_id: release-state-validation-existing-remote
    kind: negative-case
    covered_surfaces:
    - release-check-cli
    - release-state-core
    - release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/release.py
    - kind: test
      path: tests/test_release.py
    statement: existing remote tags and releases fail before mutation
- mechanism_id: post-release-archive-check
  test_coverage: direct
  assertions:
  - assertion_id: post-release-archive-check-verification
    kind: release
    covered_surfaces:
    - post-release-check-cli
    - post-release-core
    - post-release-tests
    - test-gates-docs
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/post_release.py
    - kind: test
      path: tests/test_post_release.py
    statement: GitHub release and Zenodo records are verified after release
  - assertion_id: post-release-archive-check-zenodo-waiting
    kind: workflow
    covered_surfaces:
    - post-release-check-cli
    - post-release-core
    - post-release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/post_release.py
    - kind: test
      path: tests/test_post_release.py
    statement: waiting Zenodo records are non-failing until available
- mechanism_id: post-release-doi-closeout
  test_coverage: direct
  assertions:
  - assertion_id: post-release-doi-closeout-blocks-waiting
    kind: guard
    covered_surfaces:
    - post-release-doi-closeout-cli
    - post-release-doi-closeout-core
    - post-release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/post_release_closeout.py
    - kind: test
      path: tests/test_post_release.py
    statement: DOI metadata closeout blocks while Zenodo has no verified version DOI
  - assertion_id: post-release-doi-closeout-writes-verified-metadata
    kind: release
    covered_surfaces:
    - post-release-doi-closeout-cli
    - post-release-doi-closeout-core
    - post-release-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/post_release_closeout.py
    - kind: test
      path: tests/test_post_release.py
    statement: DOI metadata closeout dry-run and write paths update only verified release DOI metadata
- mechanism_id: transfer-safety-rules
  test_coverage: direct
  assertions:
  - assertion_id: transfer-safety-rules-known-failure-classes
    kind: guard
    covered_surfaces:
    - transfer-safety-rules-yaml
    - transfer-safety-context
    evidence_refs:
    - kind: source
      path: .agentic/transfer_safety_rules.yaml
    - kind: source
      path: src/agentic_project_kit/transfer_safety_context.py
    - kind: test
      path: tests/test_transfer_safety_context.py
    statement: transfer safety headers preserve known generated patch and transfer
      failure classes
  - assertion_id: transfer-safety-rules-outbox-header
    kind: behavior
    covered_surfaces:
    - transfer-outbox-header
    - transfer-safety-tests
    evidence_refs:
    - kind: source
      path: src/agentic_project_kit/transfer_uplink.py
    - kind: test
      path: tests/test_transfer_uplink.py
    statement: transfer run logs write a deterministic local-to-LLM outbox header
- mechanism_id: transfer-wrapper-command-layer
  test_coverage: direct
  assertions:
  - assertion_id: transfer-wrapper-command-layer-registry-current
    kind: guard
    covered_surfaces:
    - command-reference-registry
    - transfer-wrapper-cli
    - command-reference-tests
    evidence_refs:
    - kind: source
      path: docs/governance/COMMAND_REFERENCE_REGISTRY_CONTRACT.md
    - kind: source
      path: docs/reference/agentic-kit-commands.json
    - kind: test
      path: tests/test_agentic_kit_command_reference_is_current.py
    statement: the generated command reference stays current when transfer wrapper
      commands change
  - assertion_id: transfer-wrapper-command-layer-governance-inventory
    kind: guard
    covered_surfaces:
    - rule-mechanism-inventory
    - pre-gui-wrapper-roadmap
    - future-gui-dispatch
    evidence_refs:
    - kind: source
      path: .agentic/rule_mechanism_inventory.yaml
    - kind: source
      path: docs/planning/WORKFLOW_REDUCTION_FOCUS.md
    - kind: test
      path: tests/test_rule_mechanism_inventory.py
    statement: the transfer-wrapper command layer is inventoried before GUI expansion
      and remains tied to tested registry sources
  - assertion_id: transfer-wrapper-command-layer-github-coverage
    kind: workflow
    covered_surfaces:
    - transfer-wrapper-cli
    - github-action-coverage
    evidence_refs:
    - kind: test
      path: tests/test_transfer_github_action_coverage.py
    - kind: source
      path: docs/planning/PROJECT_DIRECTION.yaml
    statement: transfer and GitHub workflow actions remain visible to the coverage
      audit before GUI dispatch expands
