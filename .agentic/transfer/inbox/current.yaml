schema_version: 1
id: create-post-merge-complete-pr
title: Create PR for post-merge-complete transfer command
branch: main
safety: Bounded implementation slice for a typed post-merge completion command. Cleans only known transfer/report artifacts before branching; no broad protected-file replacement.
label: create-post-merge-complete-pr
allow_blocked_start: true
report_path: docs/reports/command_runs/create-post-merge-complete-pr.md
actions:
- type: run_command
  command:
  - ./.venv/bin/python
  - .agentic/transfer/payloads/create_post_merge_complete_pr.py
