rules:
- id: remote-first-no-guess
  status: active
  text: Do not guess repository state, command syntax, file locations, release phase, GitHub JSON fields, or available evidence. Inspect the remote repository, command help, known paths, PRs, commits, logs, and authoritative repo files before acting.
- id: quality-first-no-shortcuts
  status: active
  text: Prefer deterministic, test-backed, maintainable fixes over quick patches. No shortcuts, workaround-only fixes, or chat-only promises for recurring workflow defects.
- id: patch-artifact-preflight-before-application
  status: active
  text: Before applying generated patch artifacts, run patch-artifact preflight diagnostics and fail on unsafe quoting, ambiguous YAML terms, or control-file weakening.
- id: generated-code-syntax-first
  status: active
  text: Generated shell and Python artifacts must be syntax-checked before execution or commit; generated code cannot be trusted because it looks plausible.
- id: coverage-yaml-terms-must-be-strings
  status: active
  text: Coverage YAML required terms must stay strings; colon-containing terms must be quoted or written through structured YAML writers.
- id: final-summary-self-validation
  status: active
  text: Final summaries must be self-validated against preceding output before treating a block as successful.
- id: no-copy-terminal-evidence
  status: active
  text: Routine PASS and normal FAIL handoffs must be backed by repo evidence; use d for log-backed PASS and f for log-backed FAIL. Manual terminal paste is only for hard failure, broken logging, unavailable evidence, unusable evidence, or explicit user request.
- id: rules-must-be-test-backed
  status: active
  text: Durable workflow rules need a stable repository home, documentation, and deterministic tests or guards that fail when the rule disappears or is weakened.
- id: yaml-structured-mutation-only
  status: active
  text: YAML governance files must be changed through parse-modify-dump or equivalent structured mutation, then parsed again before gates.
- id: github-connector-direct-path-first
  status: active
  text: For remote GitHub work with known paths, refs, or commits, use direct fetch, update, and PR APIs before search.
- id: control-file-preservation
  status: active
  text: Protected control files must preserve active rules and required anchors. Information preservation outranks compactness; hard length-limit trimming is forbidden.
- id: structured-summary-must-be-enforced
  status: active
  text: Relevant local or remote work blocks must end with the canonical structured SUMMARY from FINAL_SUMMARY_CONTRACT.md. Missing, malformed, contradictory, or legacy summaries are workflow drift.
- id: governed-rule-registry-before-documentation-rebuild
  status: active
  text: A governed modular rule registry must become the canonical source of truth before documentation-management rebuild work resumes.
recent_failure_patterns:
- id: guessing-before-inspection
  prevention: Before choosing commands, paths, JSON fields, release checks, or DOI sources, inspect the remote repository and command help. Treat memory and chat summaries as hypotheses until verified.
- id: interpreter-discovery-before-python
  prevention: Discover the active interpreter and project environment before invoking python, python3, pytest, ruff, or agentic-kit; prefer .venv/bin/python when the project venv exists; avoid naked python; when wrapping shell commands, avoid assuming set -e behavior unless explicitly set and logged.
- id: global-cli-or-venv-assumption
  prevention: Do not assume global CLIs or an existing venv; use project-local discovery and documented bootstrap paths.
- id: nested-triple-quote-code-generator
  prevention: Avoid nested quote-based code generation, nested shell/Python quote layers, nested triple-quoted string literals, and nested triple quotes in generated patch scripts; prefer line-list generation, existing helper scripts, simple file writes, or structured update APIs.
- id: yaml-colon-term-reinterpreted-as-mapping
  prevention: Quote colon-containing YAML terms or use structured YAML writers so plain scalars are not reinterpreted as mappings.
- id: standard-error-guards
  prevention: Recurring workflow errors must become deterministic guards, tests, or documented failure patterns.
- id: interactive-terminal-exit
  prevention: Chat-pasted terminal blocks must not end by closing the user terminal; avoid top-level exit and exec unless explicitly requested.
- id: stale-successor-handoff-prompt-after-main-merge
  prevention: Refresh STATUS, handoff_state, CURRENT_HANDOFF, and successor prompt before treating handoff prose as authoritative.
- id: repeated-yaml-governance-file-corruption
  prevention: Parse YAML before and after mutation and use a structured writer.
- id: final-pass-after-inner-fail
  prevention: Final summaries must distinguish work result from evidence result; evidence upload must not relabel failed work as PASS.
- id: lossy-control-file-shortening
  prevention: Do not shorten protected control files by deleting active rules; use successors, generated projections, or split/reference patterns.
- id: structured-summary-drift
  prevention: Verify canonical SUMMARY fields and consistency across WORK, EVIDENCE, OVERALL, REMOTE_EVIDENCE, terminal_log, command_report, CHAT_REPLY, and RESULT marker.
