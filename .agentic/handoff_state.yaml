rules:
- id: deterministic-quality-before-speed
  status: active
  text: Prefer technically robust, testable, repeatable solutions over fast workarounds. Repeated workflow failures are product defects to fix with helpers, guards, tests, and documentation.
- id: no-copy-terminal-evidence
  status: active
  text: Routine PASS handoffs must be backed by repo evidence; manual terminal paste
    is only for failure or unavailable evidence.
- id: no-unconditional-pass
  status: active
  text: Do not print PASS after a failed required command.
- id: curate-chat-end-lessons
  status: active
  text: Chat-end lessons must be curated into YAML and generated prompts without redundant,
    contradictory, or obsolete rules.
- id: last-substantive-safe-state
  status: active
  text: safe_state records the last substantive work state; administrative handoff
    refresh PRs are tracked separately to avoid refresh loops.
- id: manual-copy-terminal-by-default
  status: superseded
  text: Manual copy-and-paste terminal output was formerly used for routine handoff.
  superseded_by: no-copy-terminal-evidence
recent_failure_patterns:
- id: standard-error-guards
  prevention: >-
    Recurring workflow failures must be represented twice: in handoff prompts for human continuity
    and in repository guards/tests for deterministic prevention. Prefer durable helpers over fast manual workarounds.
- id: repo-log-written-while-committing
  prevention: Tee long runs into a temporary log outside docs/reports/terminal, finalize with ./ns terminal-finalize, then stage, commit, and push. Never commit a repo terminal log while the current process is still writing to it.
- id: unconditional-pass-after-failure
  prevention: Use set -e or explicit status handling and require log-backed PASS.
- id: overwriting-required-state-docs
  prevention: Patch state docs minimally or restore required sections before appending
    updates.
- id: missing-project-venv-tooling
  prevention: Prefer project-local .venv commands over global python, ruff, or agentic-kit.
- id: global-cli-or-venv-assumption
  prevention: At chat or workflow start, verify .venv, python3, ruff, pytest, and agentic-kit before using command names. Treat missing global agentic-kit or missing .venv as bootstrap/environment state, not as product failure.
- id: interactive-terminal-exit
  prevention: Chat-pasted terminal blocks must not call exit, logout, kill, or replace the shell with exec. Report PASS/FAIL with markers and return to the prompt. Exit codes belong inside saved scripts, not interactive paste blocks.
- id: unclassified-communication-artifact-cleanup
  prevention: Never delete communication, handoff, terminal, or command-run artifacts with ad-hoc rm. Use the central communication artifact registry and a deterministic garbage collector with dry-run, allowlist, age/status checks, tests, and a cleanup report.
- id: stale-handoff-after-administrative-refresh
  prevention: Keep safe_state tied to the last substantive commit and list administrative
    refresh PRs separately.
next_allowed_tasks:
- id: repo-backed-work-order-automation
  title: Automate long work orders as repo-backed command/action artifacts.
  priority: 1
- id: action-dry-run-validators
  title: Add deterministic dry-run validators for parameterized Git, PR, release,
    DOI, and finalize actions.
  priority: 2
blocked_until_closeout:
- GUI mutation controls
- new release cycle automation
first_instruction: Work first on deterministic command-contract and environment-bootstrap drift prevention. Verify real CLI commands, .venv availability, ns shortcuts, docs, and work-order command references before extending work-order execution or GUI controls.
handoff_maintenance:
  principle: curated-not-accumulated
  update_required_at_chat_end: true
  no_redundant_rules: true
  no_contradictory_rules: true
  remove_obsolete_rules_when_system_changes: true
  active_statuses:
  - active
  non_binding_statuses:
  - superseded
  - historical
