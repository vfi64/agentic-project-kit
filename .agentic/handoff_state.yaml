rules:
- id: remote-first-no-guess
  status: active
  text: Do not guess repository state, command syntax, file locations, release phase, GitHub JSON fields, or available evidence. Inspect the remote repository and authoritative command help or repo files first, then act on the verified result.
- id: deterministic-quality-before-speed
  status: active
  text: Prefer technically robust, testable, repeatable solutions over fast workarounds.
- id: no-copy-terminal-evidence
  status: active
  text: Routine PASS handoffs and normal FAIL handoffs must be backed by repo evidence; use d for log-backed PASS and f for log-backed FAIL. Manual terminal paste is only for hard failure, broken logging, blocked or aborted runs, unavailable pushed evidence, or explicit user request.
- id: planning-state-freshness
  status: active
  text: Current planning files must be curated and mutually consistent; stale released-version claims or obsolete next-step fragments are guard failures.
- id: shell-to-python-portability
  status: active
  text: Prefer portable Python-backed helpers and argument-vector execution over fragile shell quoting, heredocs, multiline python -c snippets, or nested quote-based code generation.
- id: rules-must-be-test-backed
  status: active
  text: Workflow rules are not complete when they only exist in chat, prose, or handoff memory. Every durable rule must have a stable repository home, a rule id, documentation, and at least one deterministic test that fails when the rule disappears or is weakened.
- id: no-unconditional-pass
  status: active
  text: Do not print PASS after a failed required command.
- id: curate-chat-end-lessons
  status: active
  text: Chat-end lessons must be curated into YAML and generated prompts without redundant, contradictory, or obsolete rules.
- id: last-substantive-safe-state
  status: active
  text: safe_state records the last substantive work state; administrative handoff refresh PRs are tracked separately to avoid refresh loops.
- id: quality-first-no-shortcuts
  status: active
  text: Always choose the technically best deterministic solution for recurring workflow problems; do not use shortcut patches that merely get the current block past the gate.
- id: yaml-structured-mutation-only
  status: active
  text: YAML governance files must be changed through parse-modify-dump or an equivalent structured mutation path, then parsed again before gates. Text injection into YAML is forbidden for complex values.
- id: canonical-handoff-prompt-command
  status: active
  text: Use agentic-kit handoff prompt or python -m agentic_project_kit.cli handoff prompt as the canonical generator. Do not use ./ns handoff prompt unless ./ns explicitly routes that command correctly.
- id: handoff-state-must-not-stale
  status: active
  text: A chat switch handoff prompt is invalid if .agentic/handoff_state.yaml points to an obsolete version, commit, or next task. Refresh handoff_state first, then regenerate the prompt.
- id: status-boundary-changelog-history
  status: active
  text: docs/STATUS.md is the compact live dashboard; CHANGELOG.md is the long-term project history. Do not solve status-headroom failures by turning STATUS.md back into a historical log.
- id: administrative-evidence-state-boundary
  status: active
  text: Separate substantive safe_state from administrative_evidence_state. Pure log, summary, handoff, or evidence commits after safe_state do not invalidate the successor-chat handoff; substantive code, doc, or product changes after safe_state do.
- id: successor-handoff-freshness-guard
  status: active
  text: Before a successor handoff prompt is treated as authoritative, check docs/STATUS.md, .agentic/handoff_state.yaml, docs/handoff/CURRENT_HANDOFF.md, and the latest successor prompt against current main; stale prompts must warn or trigger closeout refresh.
- id: administrative-refresh-loop-guard
  status: active
  text: A pure administrative handoff refresh merge must not create an endless successor-prompt refresh loop; the freshness guard may accept an administrative refresh commit when the prompt names the last substantive safe/admin state.
recent_failure_patterns:
- id: guessing-before-inspection
  prevention: Before choosing commands, paths, JSON fields, release checks, or DOI sources, inspect the remote repository and command help. Treat memory and chat summaries as hypotheses until verified.
- id: stale-planning-documents
  prevention: State freshness checks must compare STATUS, CURRENT_HANDOFF, handoff_state.yaml, release metadata, and strategy baselines before GUI or release-automation work starts.
- id: stale-successor-handoff-prompt-after-main-merge
  prevention: Run the successor handoff freshness guard and refresh STATUS, handoff_state, CURRENT_HANDOFF, and the successor prompt before treating handoff prose as authoritative.
- id: handoff-moving-head-loop
  prevention: Do not chase every final log commit with a new safe_state commit. Store administrative evidence commits separately and allow pure administrative refresh commits to point at the last substantive prompt marker.
- id: final-pass-after-inner-fail
  prevention: Final summaries must distinguish work result from evidence result. A later successful evidence push must not relabel failed work as PASS.
