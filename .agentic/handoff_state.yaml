rules:
  - id: deterministic-quality-before-speed
    status: active
    text: Prefer technically robust, testable, repeatable solutions over fast workarounds.
  - id: no-copy-terminal-evidence
    status: active
    text: Routine PASS handoffs must be backed by repo evidence; manual terminal paste is only for hard failure or unavailable evidence.
  - id: planning-state-freshness
    status: active
    text: Current planning files must be curated and mutually consistent; stale released-version claims or obsolete next-step fragments are guard failures.
  - id: shell-to-python-portability
    status: active
    text: Prefer portable Python-backed helpers and argument-vector execution over fragile shell quoting, heredocs, or multiline python -c snippets.
recent_failure_patterns:
  - id: stale-planning-documents
    prevention: State freshness checks must compare STATUS, CURRENT_HANDOFF, handoff_state.yaml, release metadata, and strategy baselines before GUI or release-automation work starts.
  - id: standard-error-guards
    prevention: Recurring workflow failures must become guards, tests, and documented contracts.
next_allowed_tasks:
  - id: planning-state-freshness-guard-hardening
    title: Strengthen deterministic guards for stale planning documents.
    priority: 1
  - id: thin-local-tkinter-cockpit
    title: Build the first thin local GUI over explicit cockpit action metadata.
    priority: 2
blocked_until_closeout:
  - Pattern Advisor expansion
  - release automation expansion
  - hidden command planning
first_instruction: Refresh planning state, run freshness guards, and only then begin the thin local Tkinter cockpit foundation.
handoff_maintenance:
  principle: curated-not-accumulated
  update_required_at_chat_end: true
  no_redundant_rules: true
  no_contradictory_rules: true
  remove_obsolete_rules_when_system_changes: true
