rules:
- id: remote-first-no-guess
  status: active
  text: Do not guess repository state, command syntax, file locations, release phase, GitHub JSON fields, or available evidence. Inspect the remote repository and authoritative command help or repo files first, then act on the verified result.
- id: deterministic-quality-before-speed
  status: active
  text: Prefer technically robust, testable, repeatable solutions over fast workarounds.
- id: no-copy-terminal-evidence
  status: active
  text: Routine PASS handoffs and normal FAIL handoffs should be backed by repo evidence whenever technically possible. Manual terminal paste is reserved for hard failure, broken logging, blocked or aborted runs, unavailable pushed evidence, or explicit user request.
- id: planning-state-freshness
  status: active
  text: Current planning files must be curated and mutually consistent; stale released-version claims or obsolete next-step fragments are guard failures.
- id: shell-to-python-portability
  status: active
  text: Prefer portable Python-backed helpers and argument-vector execution over fragile shell quoting, heredocs, multiline python -c snippets, or nested quote-based code generation.
- id: direct-ns-shell-adapter-ban
  status: active
  text: New direct ns-to-tools/ns_*.sh workflow adapters are not allowed unless explicitly documented as temporary migration exceptions with tests and a removal plan.
- id: rules-must-be-test-backed
  status: active
  text: Workflow rules are not complete when they only exist in chat, prose, or handoff memory. Every durable rule must have a stable repository home, a rule id, documentation, and at least one deterministic test that fails when the rule disappears or is weakened.
- id: no-unconditional-pass
  status: active
  text: Do not print PASS after a failed required command.
- id: final-summary-no-inner-fail-pass
  status: active
  text: A final PASS is invalid when any required inner WORK RESULT or gate result is FAIL.
- id: remote-evidence-truthfulness
  status: active
  text: REMOTE_EVIDENCE PASS requires committed and pushed evidence or an equivalent remote-readable report.
- id: local-remote-mode-guard
  status: active
  text: Workflows that depend on local or remote execution mode must run the appropriate mode guard before mutating state or reporting readiness.
- id: yaml-structured-mutation-only
  status: active
  text: YAML governance files must be changed through parse-modify-dump or an equivalent structured mutation path, then parsed again before gates.
recent_failure_patterns:
- id: guessing-before-inspection
  prevention: Inspect remote repository state and command help before choosing commands, paths, JSON fields, release checks, or DOI sources.
- id: stale-planning-documents
  prevention: State freshness checks must compare STATUS, CURRENT_HANDOFF, handoff_state.yaml, release metadata, and strategy baselines before GUI or release-automation work starts.
- id: standard-error-guards
  prevention: Recurring workflow failures must become guards, tests, and documented contracts.
- id: interpreter-discovery-before-python
  prevention: Terminal/workflow blocks must discover a usable interpreter first and prefer .venv/bin/python, then .venv/bin/python3, then python3, and only then python.
- id: global-cli-or-venv-assumption
  prevention: Verify .venv, python3, ruff, pytest, and project-local CLI routes before relying on global command names.
- id: repo-log-written-while-committing
  prevention: Tee long runs into a temporary log outside docs/reports/terminal, finalize evidence, then stage, commit, and push. Never commit a repo terminal log while the current process is still writing to it.
- id: unconditional-pass-after-failure
  prevention: Use explicit status handling and require final summary self-validation.
- id: nested-triple-quote-code-generator
  prevention: Do not generate source files through nested shell/Python quote layers or nested triple-quoted string literals inside another generated Python script.
- id: final-pass-after-inner-fail
  prevention: Final summaries must distinguish work result from evidence result. A later successful evidence push must not relabel failed work as PASS.
- id: stale-shell-test-expectation-after-adapter-removal
  prevention: Shell-adapter removal patches must update tests that previously asserted shell-file existence or shell-specific syntax.
- id: repeated-yaml-governance-file-corruption
  prevention: Patch scripts must parse YAML before and after mutation and use a structured writer.
