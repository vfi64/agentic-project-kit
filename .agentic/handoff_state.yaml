rules:
- id: no-copy-terminal-evidence
  status: active
  text: Routine PASS handoffs must be backed by repo evidence; manual terminal paste
    is only for failure or unavailable evidence.
- id: no-unconditional-pass
  status: active
  text: Do not print PASS after a failed required command.
- id: curate-chat-end-lessons
  status: active
  text: Chat-end lessons must be curated into YAML and generated prompts without redundant,
    contradictory, or obsolete rules.
- id: last-substantive-safe-state
  status: active
  text: safe_state records the last substantive work state; administrative handoff
    refresh PRs are tracked separately to avoid refresh loops.
- id: manual-copy-terminal-by-default
  status: superseded
  text: Manual copy-and-paste terminal output was formerly used for routine handoff.
  superseded_by: no-copy-terminal-evidence
recent_failure_patterns:
- id: unconditional-pass-after-failure
  prevention: Use set -e or explicit status handling and require log-backed PASS.
- id: overwriting-required-state-docs
  prevention: Patch state docs minimally or restore required sections before appending
    updates.
- id: missing-project-venv-tooling
  prevention: Prefer project-local .venv commands over global python, ruff, or agentic-kit.
- id: stale-handoff-after-administrative-refresh
  prevention: Keep safe_state tied to the last substantive commit and list administrative
    refresh PRs separately.
next_allowed_tasks:
- id: repo-backed-work-order-automation
  title: Automate long work orders as repo-backed command/action artifacts.
  priority: 1
- id: action-dry-run-validators
  title: Add deterministic dry-run validators for parameterized Git, PR, release,
    DOI, and finalize actions.
  priority: 2
blocked_until_closeout:
- GUI mutation controls
- new release cycle automation
first_instruction: Work first on repo-backed work-order automation so long implementation
  work orders are generated, stored, pulled, and executed through checked repository
  artifacts. Keep remote mutations out of scope unless an explicit checked action
  contract exists.
handoff_maintenance:
  principle: curated-not-accumulated
  update_required_at_chat_end: true
  no_redundant_rules: true
  no_contradictory_rules: true
  remove_obsolete_rules_when_system_changes: true
  active_statuses:
  - active
  non_binding_statuses:
  - superseded
  - historical
