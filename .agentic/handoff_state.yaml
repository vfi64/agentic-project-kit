rules:
- id: no-copy-terminal-evidence
  status: active
  text: Routine PASS handoffs must be backed by repo evidence; manual terminal paste
    is only for failure or unavailable evidence.
- id: no-unconditional-pass
  status: active
  text: Do not print PASS after a failed required command.
- id: curate-chat-end-lessons
  status: active
  text: Chat-end lessons must be curated into YAML and generated prompts without redundant,
    contradictory, or obsolete rules.
- id: manual-copy-terminal-by-default
  status: superseded
  text: Manual copy-and-paste terminal output was formerly used for routine handoff.
  superseded_by: no-copy-terminal-evidence
recent_failure_patterns:
- id: unconditional-pass-after-failure
  prevention: Use set -e or explicit status handling and require log-backed PASS.
- id: overwriting-required-state-docs
  prevention: Patch state docs minimally or restore required sections before appending
    updates.
- id: missing-project-venv-tooling
  prevention: Prefer project-local .venv commands over global python, ruff, or agentic-kit.
next_allowed_tasks:
- id: parametrized-git-release-actions
