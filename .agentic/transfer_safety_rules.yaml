schema_version: 1
purpose: Machine-readable safety rules for the LLM-to-local and local-to-LLM transfer
  boundary.
canonical_transfer_files:
  llm_to_local: .agentic/transfer/inbox/next_command.py.txt
  local_to_llm: .agentic/transfer/outbox/last_result.txt
canonical_transfer_execution_protocol:
  status: active
  intent: >-
    Provide a deterministic one-command handoff between a new chat, the local
    machine, and the remote repository. The user should not have to manually
    assemble sync, execution, upload, and reporting steps.
  required_order:
  - step: materialize_remote_inbox
    rule: >-
      Before executing any transfer task, the runner must ensure that the latest
      remote repository-backed task file is locally available exactly as
      .agentic/transfer/inbox/next_command.py.txt.
    requirements:
    - The local file must be overwritten from the current remote-backed state when stale.
    - The file remains a pure Python source file even though it carries the .py.txt suffix.
    - A stale local inbox file must block execution rather than being run.
  - step: validate_local_inbox
    rule: >-
      The runner must validate the canonical inbox before execution.
    requirements:
    - The canonical inbox path must exist.
    - The file content must compile as Python source.
    - The runner must record the source commit or hash used for the task file.
  - step: execute_local_inbox
    rule: >-
      The runner executes the canonical inbox with the project Python interpreter
      and captures all terminal output.
    requirements:
    - Use ./.venv/bin/python for the transfer file.
    - Prefer showing only the human-formatted summary to the local user.
    - Capture stdout, stderr, return code, and the human summary for the outbox.
  - step: write_canonical_outbox
    rule: >-
      The runner writes the complete result to
      .agentic/transfer/outbox/last_result.txt.
    requirements:
    - Include all terminal output, return code, result status, final signal, next action, and the human summary.
    - Include enough machine-readable context for the next chat to evaluate the result without chat memory.
    - Failed runs must still write last_result.txt with FINAL_SIGNAL=f or equivalent failure semantics.
  - step: publish_outbox_to_remote
    rule: >-
      The runner must safely upload or publish the outbox result to the remote
      repository before the local user treats the transfer as complete.
    requirements:
    - The remote report must be repo-readable evidence, preferably through the existing transfer report publication path.
    - Upload/publish failure must not emit g/go semantics.
    - A successful local run without a successful remote outbox/report upload is incomplete.
  - step: show_human_summary_after_remote_publish
    rule: >-
      The human-formatted summary may be shown as the completion signal only after
      last_result.txt has been written and safely published to the remote repository.
    requirements:
    - The visible user summary should be concise and human-readable.
    - Non-summary terminal output should remain available in last_result.txt and the remote report.
    - The user can then reply with g or go to ask the LLM to continue.
  - step: llm_reads_remote_outbox_before_planning
    rule: >-
      After the user replies g/go, the LLM must retrieve and evaluate the latest
      published last_result.txt or its remote report before planning further work.
    requirements:
    - Do not continue from chat memory alone.
    - Treat missing, stale, unpublished, or failed outbox state as a blocker.
    - Plan the next action from the remote-backed result and repo evidence.
  terminal_contract:
    preferred_user_visible_output: human_formatted_summary_only
    required_outbox_content:
    - full_stdout
    - full_stderr
    - human_formatted_summary
    - returncode
    - result_status
    - final_signal
    - next_action
    - source_commit_or_hash
    - remote_report_path_when_published
    completion_signal: g_or_go_only_after_remote_publish_pass
transfer_priorities:
- remote_repo_backed_work_first
- canonical_transfer_files_second
- copy_paste_only_fallback
known_failure_classes:
- wrong_branch_execution
- stale_local_branch_after_fetch
- stale_local_inbox_execution
- local_inbox_not_materialized_from_remote
- local_inbox_differs_from_remote_task
- rule_acknowledgement_head_mismatch
- dirty_worktree_before_transfer
- accumulated_untracked_transfer_or_report_files
- failed_report_publication_misread_as_go_signal
- summary_shown_before_outbox_remote_publish
- outbox_not_written_before_completion_signal
- outbox_not_uploaded_to_remote
- user_go_before_remote_report_published
- llm_planning_without_reading_remote_outbox
- diagnostic_status_success_masking_earlier_blocker
- heredoc_style_shell_mutation
- unescaped_shell_substitution
- raw_newline_in_python_string_literals
- quote_escape_drift
- fragile_multiline_inline_python_commands
- long_shell_mutation_blocks
- line_ending_drift
- python_transfer_txt_suffix_not_syntax_validated
- partial_patch_application
- fragile_text_anchor_patching
- accidental_compatibility_key_removal
- destructive_use_of_moving_references
- implicit_main_push_or_upstream_mutation
- syntax_broken_python_before_cli_import
- cli_parameter_drift
- pr_create_missing_required_head
- finalize_log_missing_required_metadata
- evidence_inspect_wrong_run_log_option
- admin_refresh_pr_missing_after_pr
- rule_acknowledgement_required_after_commit
- terminal_quote_prompt_hang
preflight_rules:
- remote_repo_state_must_be_checked_before_transfer_execution
- canonical_inbox_must_be_materialized_from_remote_before_execution
- local_inbox_must_match_remote_task_source
- expected_branch_must_match
- worktree_must_be_clean_before_transfer
- local_head_must_match_upstream_head
- rule_acknowledgement_must_match_head
- canonical_inbox_file_must_exist
- canonical_inbox_file_must_compile_as_python_source
post_patch_rules:
- changed_python_files_must_compile_before_cli_import
- failed_guard_must_emit_final_signal_f
- failed_guard_must_not_emit_go_semantics
outbox_publication_rules:
- canonical_outbox_must_be_written_for_every_transfer_run
- canonical_outbox_must_include_human_summary_and_full_terminal_output
- canonical_outbox_must_be_published_to_remote_before_g_or_go
- failed_local_runs_may_be_published_as_evidence_but_must_not_emit_go_semantics
- llm_must_read_remote_outbox_or_report_before_next_plan
canonical_cli_usage:
  transfer_pr_create:
    command: agentic-kit transfer pr-create --base main --head <branch> --title <title>
      --body <body>
    required_options:
    - --head
    - --title
    notes:
    - --base defaults to main but should be explicit in transfer examples
    - Run transfer pr-status on the created PR after creation
  evidence_finalize_log:
    command: agentic-kit evidence finalize-log --run-log <path> --remote-log <docs/reports/terminal/name.log>
      --slice <name> --scope <text> --mode-check <text> --command-report <text> --interpretation
      <text> --safe-step <text>
    required_options:
    - --run-log
    - --remote-log
    - --slice
    - --scope
    - --mode-check
    - --command-report
    - --interpretation
    - --safe-step
    notes:
    - remote-log must be repository-relative under docs/reports/terminal/
    - run-log may already be the same repository-relative evidence path
    - Use --commit-message and --push only when the current branch is intended for
      evidence publication
  evidence_inspect:
    command: agentic-kit evidence inspect --require-summary <path>
    invalid_forms:
    - agentic-kit evidence inspect --run-log <path>
    notes:
    - The log path is a positional argument, not --run-log
  transfer_admin_refresh_pr:
    command: agentic-kit transfer admin-refresh-pr --after-pr <merged-pr-number>
    required_options:
    - --after-pr
    notes:
    - Use after post-merge-check reports REFRESH_REQUIRED
    - Then run transfer pr-status, pr-wait-ci, and pr-merge-safe on the created admin
      PR
  rules_acknowledge_after_commit:
    command: agentic-kit rules acknowledge
    trigger: required after every commit because repo_head changes
    notes:
    - Do not run transfer actions after a commit until the current rule snapshot has
      been acknowledged
terminal_block_rules:
  preferred:
  - Use printf '%s\n' for visible shell output lines
  - Keep terminal blocks small
  - Avoid unterminated single or double quotes
  - Avoid large nested quote blocks
  - Use ./.venv/bin/python instead of python
  avoid:
  - long heredoc-style shell mutation blocks
  - inline Python with complex shell quoting
  - commands that can leave zsh in quote> or dquote>
  recovery:
  - If quote>, dquote>, or heredoc> appears, press Ctrl-C, then run git status --short
    and git branch --show-current
