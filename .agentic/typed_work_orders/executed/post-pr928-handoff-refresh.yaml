id: post-pr928-handoff-refresh
title: Post PR928 handoff refresh
safety: local-only
log_path: docs/reports/terminal/post-pr928-handoff-refresh.log
block_dirty_worktree: true
steps:
  - kind: command_argv
    label: refresh handoff safe state
    argv:
      - .venv/bin/agentic-kit
      - handoff
      - refresh
      - .agentic/handoff_state.yaml
      - --write
  - kind: command_argv
    label: handoff check
    argv:
      - .venv/bin/agentic-kit
      - handoff
      - check
  - kind: command_argv
    label: handoff post merge refresh status
    argv:
      - .venv/bin/agentic-kit
      - handoff
      - post-merge-refresh-status
  - kind: command_argv
    label: doctor
    argv:
      - .venv/bin/agentic-kit
      - doctor
  - kind: command_argv
    label: check docs
    argv:
      - .venv/bin/agentic-kit
      - check-docs
