version: 1
purpose: Machine-checkable documentation coverage matrix for public commands, governance
  concepts, user workflows, and project-state files. This file prevents implemented
  capabilities from becoming invisible in the documentation set.
rules:
- id: workflow-guard-coverage
  description: Workflow guard diagnostics for recurring workflow failures must remain visible and test-backed.
  documents:
  - path: README.md
    terms:
    - agentic-kit workflow-guard check
    - workflow guard
  - path: docs/TEST_GATES.md
    terms:
    - Workflow Guard Gate
    - agentic-kit workflow-guard check
    - governance YAML parse failures
    - protected control files
    - repair plan
  - path: docs/workflow/WORKFLOW_GUARD.md
    terms:
    - Workflow Guard
    - diagnose-and-fail
    - protected control files
    - repair plan
- id: documentation-system-audit-coverage
  description: Umbrella documentation-system audit must remain discoverable and must
    cover the six top-level documentation governance dimensions.
  documents:
  - path: README.md
    terms:
    - Documentation system audit
    - agentic-kit docs-audit
    - Aktualität
    - Vollständigkeit
    - Korrektheit
    - Redundanzfreiheit
    - Stringenz der Dokumentenordnung
    - Konsistenz
  - path: docs/TEST_GATES.md
    terms:
    - Documentation System Audit Gate
    - agentic-kit docs-audit
    - Aktualität
    - Vollständigkeit
    - Korrektheit
    - Redundanzfreiheit
    - Stringenz der Dokumentenordnung
    - Konsistenz
  - path: docs/governance/DOCUMENTATION_SYSTEM_AUDIT_CONTRACT.md
    terms:
    - Documentation System Audit Contract
    - agentic-kit docs-audit
    - review-only
- id: planning-doc-slice-gate-coverage
  description: Temporary planning-documentation slice gate must remain discoverable
    and must keep helper-local success separate from governed slice success.
  documents:
  - path: README.md
    terms:
    - Planning-documentation slice gate
    - agentic-kit slice gate --kind planning-doc
    - SLICE_GATE_RESULT
    - slice_result=PASS|BLOCKED
    - helper-local PASS is not a slice PASS
    - merge_pr_ready=NO
  - path: docs/TEST_GATES.md
    terms:
    - Planning-Documentation Slice Gate
    - agentic-kit slice gate --kind planning-doc
    - SLICE_GATE_RESULT
    - gate=... status=PASS|FAIL
    - slice_result=PASS|BLOCKED
    - helper-local PASS from slice PASS
    - agentic-kit docs-audit
- id: llm-communication-bootstrap-coverage
  description: Portable LLM communication, final summary, bootstrap, drift, and handoff
    contracts must remain visible without turning status files into duplicate rule
    books.
  documents:
  - path: .agentic/compiled_agent_context.yaml
    terms:
    - mandatory_successor_chat_sources
    - chat-communication-contract
    - portable-chat-execution-contract
    - chat-bootstrap-and-drift-contract
    - forbidden_remote_evidence_values
    - shell_role
    - fail_closed
    - local_repo_freshness_before_local_work
    - local-main-freshness-before-local-work
  - path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
    terms:
    - User acknowledgements
    - LLM-to-user rules
    - LLM-to-terminal rules
    - Terminal-to-LLM rules
    - a rendered final summary printed in the terminal output
    - Failure communication
    - PASS communication
    - 'REMOTE_EVIDENCE: PENDING'
    - paste-output
  - path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    terms:
    - operating-system-independent
    - Python modules
    - shell=False
    - Shell commands are adapters only
    - pathlib.Path
    - shutil
    - platform
    - subprocess.run
    - Local repository freshness rule
    - Mutation before that precondition is forbidden
  - path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    terms:
    - Mandatory startup sequence
    - Drift classes
    - Drift response
    - Handoff prompt requirements
    - comm-rules-check
    - fail closed
    - Local repository freshness precondition
    - Continuing product or governance mutation from a stale or contaminated local
      tree is drift
  - path: docs/governance/FINAL_SUMMARY_CONTRACT.md
    terms:
    - 'REMOTE_EVIDENCE: PASS|FAIL|PARTIAL|NOT_REQUIRED'
    - 'WORK: PASS|FAIL|PENDING|HARD-FAIL|NO-COMMAND'
    - No legacy handwritten summary fallback
  - path: docs/TEST_GATES.md
    terms:
    - LLM Communication and Bootstrap Gate
    - CHAT_COMMUNICATION_CONTRACT.md
    - PORTABLE_CHAT_EXECUTION_CONTRACT.md
    - CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - concise pointers, not duplicate rule books
    - Local Freshness Gate
    - local repository freshness precondition
