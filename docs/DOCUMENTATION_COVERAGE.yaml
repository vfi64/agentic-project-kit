    - agentic-kit check-docs
    - agentic-kit check-todo
    - agentic-kit doctor
    - agentic-kit doc-mesh-audit
    - agentic-kit doc-mesh-repair
    - agentic-kit release-plan
    - agentic-kit release-check
    - agentic-kit post-release-check
    - agentic-kit github-create
    - agentic-kit todo list
    - agentic-kit todo complete
    - agentic-kit todo render
    - agentic-kit workflow go
    - agentic-kit workflow upload-output
    - agentic-kit workflow state
    - agentic-kit workflow list
    - agentic-kit workflow show
    - agentic-kit workflow upload
    - agentic-kit work start --from-ref
    - agentic-kit work discard-changes
    - agentic-kit transfer list-refs --json
    - agentic-kit workflow request
    - agentic-kit workflow run
    - agentic-kit workflow status
    - agentic-kit workflow status --explain
    - agentic-kit workflow cleanup
    - agentic-kit workflow fail-report
    - agentic-kit audit-status-current-state
    - agentic-kit audit-path-literals
    - agentic-kit doc-registry register
    - agentic-kit doc-registry check-unregistered
    - agentic-kit doc-registry check-unregistered --strict-scope
    - agentic-kit rule-registry register
    - agentic-kit patterns list
    - agentic-kit patterns show
    - agentic-kit slice gate --kind planning-doc
    - agentic-kit workflow-guard check
- id: documentation-registry-scope-coverage
  description: Declarative documentation registry scope must remain visible without
    forcing broad migration or enabling strict scope in the standard suite before
    maintainers fill the scope.
  documents:
  - path: README.md
    terms:
    - docs/DOC_REGISTRY_SCOPE.yaml
    - agentic-kit doc-registry check-unregistered --strict-scope
    - declared required scope
  - path: docs/governance/DOCUMENTATION_REGISTRY_CONTRACT.md
    terms:
    - Declarative scope
    - docs/DOC_REGISTRY_SCOPE.yaml
    - required_paths
    - exempt_paths
    - docs/planning/DOC_REGISTRY_SCOPE_DECISION.md
    - standard suite does not enable
  - path: docs/TEST_GATES.md
    terms:
    - docs/DOC_REGISTRY_SCOPE.yaml
    - docs/planning/DOC_REGISTRY_SCOPE_DECISION.md
    - agentic-kit doc-registry check-unregistered --strict-scope
    - standard gate suite while the checked-in scope is empty
  - path: docs/DOC_REGISTRY_SCOPE.yaml
    terms:
    - 'schema_version: 1'
    - 'required_paths: []'
    - 'exempt_paths: []'
  - path: docs/planning/DOC_REGISTRY_SCOPE_DECISION.md
    terms:
    - Documentation Registry Scope Decision Template
    - No scope recommendation is encoded here
    - 'proposed: required / exempt / undecided'
- id: status-current-state-audit-coverage
  description: Status current-state audit must remain discoverable as the deterministic
    guard for STATUS, CHANGELOG, generated handoff validation, release-status, and
    origin/main drift.
  documents:
