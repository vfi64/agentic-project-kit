version: 1
purpose: Machine-checkable documentation coverage matrix for public commands, governance
  concepts, user workflows, and project-state files. This file prevents implemented
  capabilities from becoming invisible in the documentation set.
rules:
- id: documentation-system-audit-coverage
  description: Umbrella documentation-system audit must remain discoverable and must
    cover the six top-level documentation governance dimensions.
  documents:
  - path: README.md
    terms:
    - Documentation system audit
    - agentic-kit docs-audit
    - Aktualität
    - Vollständigkeit
    - Korrektheit
    - Redundanzfreiheit
    - Stringenz der Dokumentenordnung
    - Konsistenz
  - path: docs/TEST_GATES.md
    terms:
    - Documentation System Audit Gate
    - agentic-kit docs-audit
    - Aktualität
    - Vollständigkeit
    - Korrektheit
    - Redundanzfreiheit
    - Stringenz der Dokumentenordnung
    - Konsistenz
  - path: docs/governance/DOCUMENTATION_SYSTEM_AUDIT_CONTRACT.md
    terms:
    - Documentation System Audit Contract
    - agentic-kit docs-audit
    - review-only
- id: llm-communication-bootstrap-coverage
  description: Portable LLM communication, final summary, bootstrap, drift, and handoff
    contracts must remain visible without turning status files into duplicate rule
    books.
  documents:
  - path: .agentic/compiled_agent_context.yaml
    terms:
    - mandatory_successor_chat_sources
    - chat-communication-contract
    - portable-chat-execution-contract
    - chat-bootstrap-and-drift-contract
    - forbidden_remote_evidence_values
    - shell_role
    - fail_closed
    - local_repo_freshness_before_local_work
    - local-main-freshness-before-local-work
    - github_connector_direct_path_first
    - github-connector-direct-path-first
    - yaml_governance_mutation_requires_parse_modify_dump
    - yaml-governance-parse-modify-dump-only
  - path: docs/governance/CHAT_COMMUNICATION_CONTRACT.md
    terms:
    - User acknowledgements
    - LLM-to-user rules
    - LLM-to-terminal rules
    - Terminal-to-LLM rules
    - a rendered final summary printed in the terminal output
    - Failure communication
    - PASS communication
    - 'REMOTE_EVIDENCE: PENDING'
    - paste-output
  - path: docs/governance/PORTABLE_CHAT_EXECUTION_CONTRACT.md
    terms:
    - operating-system-independent
    - Python modules
    - shell=False
    - Shell commands are adapters only
    - pathlib.Path
    - shutil
    - platform
    - subprocess.run
    - Local repository freshness rule
    - Mutation before that precondition is forbidden
    - Remote connector route rule
    - Search is for unknown paths or symbols
    - Governance YAML mutation rule
    - YAML parse error in CI is a workflow defect
  - path: docs/governance/CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    terms:
    - Mandatory startup sequence
    - Drift classes
    - Drift response
    - Handoff prompt requirements
    - comm-rules-check
    - fail closed
    - Local repository freshness precondition
    - Continuing product or governance mutation from a stale or contaminated local
      tree is drift
    - Remote repository connector route
    - GitHub connector direct-path-first workflow
    - Governance YAML mutation rule
    - The only allowed mutation workflow for these files is parse-modify-dump
  - path: docs/governance/FINAL_SUMMARY_CONTRACT.md
    terms:
    - 'REMOTE_EVIDENCE: PASS|FAIL|PARTIAL|NOT_REQUIRED'
    - 'WORK: PASS|FAIL|PENDING|HARD-FAIL|NO-COMMAND'
    - No legacy handwritten summary fallback
  - path: docs/TEST_GATES.md
    terms:
    - LLM Communication and Bootstrap Gate
    - CHAT_COMMUNICATION_CONTRACT.md
    - PORTABLE_CHAT_EXECUTION_CONTRACT.md
    - CHAT_BOOTSTRAP_AND_DRIFT_CONTRACT.md
    - concise pointers, not duplicate rule books
    - Local Freshness Gate
    - local repository freshness precondition
    - Remote Connector Gate
    - YAML Mutation Gate
- id: public-command-readme-coverage
  description: Public CLI commands must be discoverable from README.md.
  documents:
  - path: README.md
    terms:
    - agentic-kit init
    - agentic-kit check
    - agentic-kit check-docs
    - agentic-kit check-todo
    - agentic-kit doctor
    - agentic-kit doc-mesh-audit
    - agentic-kit doc-mesh-repair
    - agentic-kit release-plan
    - agentic-kit release-check
    - agentic-kit post-release-check
    - agentic-kit github-create
    - agentic-kit todo list
    - agentic-kit todo complete
    - agentic-kit todo render
    - agentic-kit workflow go
    - agentic-kit workflow upload-output
    - agentic-kit workflow state
    - agentic-kit workflow list
    - agentic-kit workflow show
    - agentic-kit workflow upload
    - agentic-kit workflow request
    - agentic-kit workflow run
    - agentic-kit workflow status
    - agentic-kit workflow status --explain
    - agentic-kit workflow cleanup
    - agentic-kit workflow fail-report
    - agentic-kit patterns list
    - agentic-kit patterns show
- id: pattern-advisor-readme-coverage
  description: Read-only Pattern Advisor MVP commands and boundaries must remain visible.
  documents:
  - path: README.md
    terms:
    - Pattern Advisor read-only catalog
    - agentic-kit patterns list
    - agentic-kit patterns show
    - advisory-only
    - no gates
  - path: docs/STATUS.md
    terms:
    - Pattern Advisor
    - read-only catalog
    - patterns list
    - patterns show
    - advisory-only
- id: workflow-readme-coverage
  description: Main user workflows must have README-level entry points.
  documents:
  - path: README.md
    terms:
    - Installation for local development
    - Quick start
    - Project contract, profiles, and policy packs
    - Policy-pack doctor checks
    - Project health check
    - Release planning and validation
    - TODO workflow
    - Workflow Output Cycle
    - CLI command package structure
    - GitHub integration
    - Agentic development model
    - Documentation coverage and drift checks
    - Documentation mesh audit
    - Logging and evidence
    - Citation and archiving
    - Safety rule
    - Current status
- id: documentation-mesh-audit-coverage
  description: Documentation mesh audit command and document taxonomy must remain
    visible.
  documents:
  - path: README.md
    terms:
    - Documentation mesh audit
    - agentic-kit doc-mesh-audit
    - agentic-kit doc-mesh-repair
    - current-state documents
    - release-history documents
    - governance documents
    - architecture/design documents
    - historical-plan documents
    - release DOI list mismatches
    - historical-source-of-truth banners
  - path: docs/TEST_GATES.md
    terms:
    - Documentation Mesh Audit Gate
    - agentic-kit doc-mesh-audit
    - current-state documents
    - release-history documents
    - governance documents
    - architecture/design documents
    - historical-plan documents
    - release DOI list mismatches
  - path: AGENTS.md
    terms:
    - Modular Implementation Rule
    - Existing monoliths must not be allowed to grow
    - incremental modularization
- id: workflow-cli-readme-coverage
  description: Workflow CLI, state machine, and legacy entry point must remain visible.
  documents:
  - path: README.md
    terms:
    - agentic-kit workflow request
    - agentic-kit workflow run
    - agentic-kit workflow status
    - agentic-kit workflow cleanup
    - .agentic/workflow_state
    - IDLE
    - ./ns
    - ./ns --request
  - path: docs/WORKFLOW_OUTPUT_CYCLE.md
    terms:
    - agentic-kit workflow request
    - agentic-kit workflow run
    - agentic-kit workflow status
    - agentic-kit workflow cleanup
    - .agentic/current_work.yaml
    - docs/reports/CURRENT_WORKFLOW_OUTPUT.md
- id: next-step-terminal-workflow-coverage
  description: Standard chat-assisted next-step workflow must remain visible to agents
    and workflow docs.
  documents:
  - path: AGENTS.md
    terms:
    - Standard next-step terminal workflow
    - cd <your-project-root>
    - ./ns
    - ./ns --request
    - done
    - The short acknowledgement `d` is also valid
    - instead of long manual Copy-and-Paste terminal blocks
    - agentic-kit workflow request
    - agentic-kit workflow cleanup
  - path: docs/WORKFLOW_OUTPUT_CYCLE.md
    terms:
    - Standard next-step terminal workflow
