    - missing .venv/bin/python -> create .venv with the current Python interpreter
    - missing .venv/bin/ruff or .venv/bin/agentic-kit -> run .venv/bin/python -m pip
      install -e .[dev]
    - .venv/bin/python
    - .venv/bin/ruff
    - .venv/bin/agentic-kit
    - This does not activate the virtual environment in the parent shell
