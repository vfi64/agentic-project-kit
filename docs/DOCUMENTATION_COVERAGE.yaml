version: 1
purpose: >-
  Machine-checkable documentation coverage matrix for public commands,
  governance concepts, user workflows, and project-state files.
  This file prevents implemented capabilities from becoming invisible in the
  documentation set.

rules:
  - id: public-command-readme-coverage
    description: Public CLI commands must be discoverable from README.md.
    documents:
      - path: README.md
        terms:
          - agentic-kit init
          - agentic-kit check
          - agentic-kit check-docs
          - agentic-kit check-todo
          - agentic-kit doctor
          - agentic-kit doc-mesh-audit
          - agentic-kit doc-mesh-repair
          - agentic-kit release-plan
          - agentic-kit release-check
          - agentic-kit post-release-check
          - agentic-kit github-create
          - agentic-kit todo list
          - agentic-kit todo complete
          - agentic-kit todo render
          - agentic-kit workflow request
          - agentic-kit workflow run
          - agentic-kit workflow status
          - agentic-kit workflow cleanup

  - id: workflow-readme-coverage
    description: Main user workflows must have README-level entry points.
    documents:
      - path: README.md
        terms:
          - Installation for local development
          - Quick start
          - Project contract, profiles, and policy packs
          - Policy-pack doctor checks
          - Project health check
          - Release planning and validation
          - TODO workflow
          - Workflow Output Cycle
          - CLI command package structure
          - GitHub integration
          - Agentic development model
          - Documentation coverage and drift checks
          - Documentation mesh audit
          - Logging and evidence
          - Citation and archiving
          - Safety rule
          - Current status

  - id: documentation-mesh-audit-coverage
    description: Documentation mesh audit command and document taxonomy must remain visible.
    documents:
      - path: README.md
        terms:
          - Documentation mesh audit
          - agentic-kit doc-mesh-audit
          - agentic-kit doc-mesh-repair
          - current-state documents
          - release-history documents
          - governance documents
          - architecture/design documents
          - historical-plan documents
          - release DOI list mismatches
          - historical-source-of-truth banners
      - path: docs/TEST_GATES.md
        terms:
          - Documentation Mesh Audit Gate
          - agentic-kit doc-mesh-audit
          - current-state documents
          - release-history documents
          - governance documents
          - architecture/design documents
          - historical-plan documents
          - release DOI list mismatches
      - path: AGENTS.md
        terms:
          - Modular Implementation Rule
          - Existing monoliths must not be allowed to grow
          - incremental modularization

  - id: workflow-cli-readme-coverage
    description: Workflow CLI, state machine, and legacy entry point must remain visible.
    documents:
      - path: README.md
        terms:
          - agentic-kit workflow request
          - agentic-kit workflow run
          - agentic-kit workflow status
          - agentic-kit workflow cleanup
          - .agentic/workflow_state
          - IDLE
          - python tools/next-step.py
      - path: docs/WORKFLOW_OUTPUT_CYCLE.md
        terms:
          - agentic-kit workflow request
          - agentic-kit workflow run
          - agentic-kit workflow status
          - agentic-kit workflow cleanup
          - .agentic/current_work.yaml
          - docs/reports/CURRENT_WORKFLOW_OUTPUT.md

  - id: next-step-terminal-workflow-coverage
    description: Standard chat-assisted next-step workflow must remain visible to agents and workflow docs.
    documents:
      - path: AGENTS.md
        terms:
          - Standard next-step terminal workflow
          - cd /Users/hof/Dropbox/Privat/GitHub/agentic-project-kit
          - python tools/next-step.py
          - done
          - The short acknowledgement `d` is also valid
          - instead of long manual Copy-and-Paste terminal blocks
          - agentic-kit workflow request
          - agentic-kit workflow cleanup
      - path: docs/WORKFLOW_OUTPUT_CYCLE.md
        terms:
          - Standard next-step terminal workflow
          - python3 tools/next-step.py
          - done
          - The short acknowledgement `d` is also valid
          - manual Copy-and-Paste blocks
          - compatibility bridge

  - id: single-command-next-step-coverage
    description: next-step.py must document its single-command state behavior.
    documents:
      - path: docs/WORKFLOW_OUTPUT_CYCLE.md
        terms:
          - Single-command state behavior
          - IDLE + .agentic/current_work.yaml -> REQUESTED -> run workflow -> upload evidence -> UPLOADED
          - UPLOADED -> cleanup temporary evidence branch -> IDLE
          - FAILED -> preserve evidence; no automatic cleanup
          - RUNNING -> refuse duplicate execution
          - Optional shell shortcut
          - alias ns=

  - id: failed-next-step-handling-coverage
    description: FAILED workflow-state handling must remain explicit because it requires diagnosis, not automatic cleanup.
    documents:
      - path: docs/WORKFLOW_OUTPUT_CYCLE.md
        terms:
          - FAILED handling
          - stop-and-diagnose state
          - Do not repeatedly run `ns` or `python3 tools/next-step.py`
          - Preserve the local terminal output and any files under `tmp/agent-evidence/`
          - Send the relevant terminal output to the assistant if no temporary evidence branch was uploaded
          - git status --short
          - git branch --show-current
          - cat .agentic/workflow_state
          - git restore .agentic/workflow_state docs/reports/CURRENT_WORKFLOW_OUTPUT.md
          - rm -f tmp/agent-evidence/workflow-output-*.md
          - It is not sufficient for a local `FAILED` state
          - Never automatically clean up from `FAILED`

  - id: next-step-environment-bootstrap-coverage
    description: next-step.py environment bootstrap must stay documented and bounded.
    documents:
      - path: docs/WORKFLOW_OUTPUT_CYCLE.md
        terms:
          - Environment bootstrap
          - missing .venv/bin/python -> create .venv with the current Python interpreter
          - missing .venv/bin/ruff or .venv/bin/agentic-kit -> run .venv/bin/python -m pip install -e .[dev]
          - .venv/bin/python
          - .venv/bin/ruff
          - .venv/bin/agentic-kit
          - This does not activate the virtual environment in the parent shell

  - id: default-local-gate-workflow-coverage
    description: Default next-step gate workflow must remain documented and bounded.
    documents:
      - path: docs/WORKFLOW_OUTPUT_CYCLE.md
        terms:
          - Default current-branch local gate workflow
          - default-current-branch-local-gate
          - pytest
          - ruff_check
          - check_docs
          - doctor
      - path: .agentic/current_work.yaml
        terms:
          - default-current-branch-local-gate
          - git_fetch
          - git_pull_ff_only
          - pytest
          - ruff_check
          - check_docs
          - doctor

  - id: cli-package-readme-coverage
    description: CLI package modularization must remain visible after the monolith split.
    documents:
      - path: README.md
        terms:
          - CLI command package structure
          - src/agentic_project_kit/cli_commands/
          - thin root command registry
          - cli.py
          - Boundary tests

  - id: release-version-readme-coverage
    description: README must mention the current release candidate and latest verified DOI state.
    documents:
      - path: README.md
        terms:
          - Version `0.3.4`
          - v0.3.3
          - 10.5281/zenodo.20151924

  - id: example-workflow-coverage
    description: README must point users to the minimal generated-project example.
    documents:
      - path: README.md
        terms:
          - Example workflow
          - docs/examples/minimal-python-cli.md

  - id: project-contract-readme-coverage
    description: Project contract, profiles, and policy packs must remain visible to users.
    documents:
      - path: README.md
        terms:
          - .agentic/project.yaml
          - project contract
          - project profiles
          - policy packs
          - --profiles
          - --policy-packs
          - generic-git-repo
          - markdown-docs
          - python-cli
          - agentic-development
          - documentation-governed

  - id: policy-pack-doctor-coverage
    description: Policy-pack-driven doctor checks must remain visible to users.
    documents:
      - path: README.md
        terms:
          - Policy-pack doctor checks
          - policy-pack checks
          - solo-maintainer
          - release-managed
          - documentation-governed
          - structural prerequisites
      - path: docs/STATUS.md
        terms:
          - policy-pack doctor checks
          - policy packs
      - path: docs/handoff/CURRENT_HANDOFF.md
        terms:
          - policy-pack checks
          - policy packs

  - id: semantic-quality-boundary-coverage
    description: Semantic quality limits must remain explicit so deterministic checks are not oversold.
    documents:
      - path: docs/architecture/ARCHITECTURE_CONTRACT.md
        terms:
          - Semantic quality boundary
          - semantic perfection
          - advisory review
          - hard deterministic gates
          - LLM-based semantic review
      - path: docs/TEST_GATES.md
        terms:
          - semantic perfection
          - deterministic quality heuristics
          - advisory review
      - path: README.md
        terms:
          - deterministic document-quality heuristics
          - semantic perfection
          - advisory review

  - id: gate-document-command-coverage
    description: Gate documentation must mention the commands used as evidence.
    documents:
      - path: docs/TEST_GATES.md
        terms:
          - agentic-kit check-docs
          - agentic-kit doctor
          - agentic-kit release-plan
          - agentic-kit release-check
          - agentic-kit post-release-check
          - agentic-kit doc-mesh-audit
          - agentic-kit check-todo
          - docs/DOCUMENTATION_COVERAGE.yaml
          - Architecture Contract Gate
          - Documentation Coverage Gate
          - Documentation Mesh Audit Gate
          - Standard Local Gate
          - Doctor Gate
          - Release Gate
          - Outcome Reporting

  - id: rule-hardening-coverage
    description: Governance rules must be backed by tests, gates, coverage checks, or explicit review-only exceptions.
    documents:
      - path: AGENTS.md
        terms:
          - Rule Hardening Rule
          - deterministic unit or integration test
          - documentation coverage requirement
          - explicit review-only exception
      - path: docs/TEST_GATES.md
        terms:
          - Rule Hardening Gate
          - Governance rule change
          - deterministic unit or integration test
          - documented review-only exception

  - id: post-release-zenodo-coverage
    description: Post-release Zenodo checks must remain visible and separate from pre-release gates.
    documents:
      - path: README.md
        terms:
          - agentic-kit post-release-check
          - verified Zenodo version record
          - WAITING
          - README/CITATION DOI metadata unchanged
          - separate from release-check
      - path: docs/STATUS.md
        terms:
          - post-release Zenodo
          - agentic-kit post-release-check
      - path: docs/handoff/CURRENT_HANDOFF.md
        terms:
          - post-release Zenodo
          - agentic-kit post-release-check

  - id: agent-instruction-coverage
    description: Agent instructions must point agents to architecture and documentation coverage duties.
    documents:
      - path: AGENTS.md
        terms:
          - docs/architecture/ARCHITECTURE_CONTRACT.md
          - docs/DOCUMENTATION_COVERAGE.yaml
          - agentic-kit check-docs
          - agentic-kit doctor
          - Architecture Contract Rule
          - Documentation Coverage Rule
          - Required Local Gate

  - id: architecture-contract-coverage
    description: The architecture contract must define the concepts that govern new checks.
    documents:
      - path: docs/architecture/ARCHITECTURE_CONTRACT.md
        terms:
          - Project contract
          - Profile
          - Policy pack
          - Doctor
          - Diagnostic
          - Reviewability
          - Evidence
          - Architecture fitness function
          - documentation gates
          - deterministic checks
          - review infrastructure

  - id: state-doc-coverage
    description: State and handoff files must mention the current documentation coverage gate.
    documents:
      - path: docs/STATUS.md
        terms:
          - documentation coverage
          - docs/DOCUMENTATION_COVERAGE.yaml
          - agentic-kit check-docs
          - agentic-kit doctor
      - path: docs/handoff/CURRENT_HANDOFF.md
        terms:
          - documentation coverage
          - docs/DOCUMENTATION_COVERAGE.yaml
          - agentic-kit check-docs
          - agentic-kit doctor

  - id: citation-release-coverage
    description: Release, citation, and archival workflows must be visible in README and gates.
    documents:
      - path: README.md
        terms:
          - CITATION.cff
          - .zenodo.json
          - Zenodo
          - DOI
          - agentic-kit release-plan
          - agentic-kit release-check
          - agentic-kit post-release-check
      - path: docs/TEST_GATES.md
        terms:
          - Packaging Gate
          - Release Gate
          - agentic-kit release-plan
          - agentic-kit release-check
          - agentic-kit post-release-check

  - id: safety-evidence-coverage
    description: Safety and evidence constraints must be visible to users and agents.
    documents:
      - path: README.md
        terms:
          - Do not generate a public project from a private repository history
          - Logs are diagnostic evidence
          - Do not commit secrets
      - path: AGENTS.md
        terms:
          - do not weaken tests
          - evidence requirements
          - architecture-contract update
