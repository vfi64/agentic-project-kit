# Authoritative machine-readable project direction file.
#
# Human-readable output:
#   agentic-kit project-direction
#   agentic-kit project-direction --section strategy
#   agentic-kit project-direction --section roadmap
#   agentic-kit project-direction --section plans
#   agentic-kit project-direction --section ideas
#   agentic-kit project-direction --section done
#   agentic-kit project-direction --section discarded
#   agentic-kit project-direction --section all
#   agentic-kit project-direction --format text
#   agentic-kit project-direction --format markdown
#   agentic-kit project-direction --format json
#
# Governance:
#   This file is the active source for project strategy, roadmap, plans,
#   candidate ideas, completed work, and discarded planning choices.
#   Older planning, roadmap, strategy, and idea documents remain migration
#   sources until reference-clean consolidation removes or archives them.
schema_version: 1
meta:
  owner: maintainers
  status: active
  updated_after_pr: pending-pr-strict-scope-suite-adoption
  update_policy: update after successful slice, release, or strategic decision
  authority: docs/planning/PROJECT_DIRECTION.yaml
  migration_state: active-content-migrated
  migration_date: "2026-07-05"

strategy:
  - id: governed-operating-model
    status: active
    title: Governed operating model
    rationale: >-
      Prefer deterministic wrappers, machine-checked gates, repo-backed
      evidence, and explicit planning authority over raw shell, implicit chat
      memory, duplicated workflow logic, or manually maintained status
      fragments.
    evidence:
      - docs/architecture/ARCHITECTURE_CONTRACT.md
      - docs/planning/KIT_AS_OS_MASTERPLAN.md
    source_files:
      - docs/planning/PROJECT_DIRECTION.yaml
      - docs/planning/COMMAND_SAFETY_HARDENING_PLAN.md
      - docs/planning/FAILURE_MODE_REVIEW_AUTOMATION_PLAN.md
      - docs/planning/NEXT_TURN_WORK_ORDER_WORKFLOW_PLAN.md
      - docs/planning/POST_MERGE_LIFECYCLE_STATE_MODEL.md
      - docs/planning/POST_V042_STANDARD_ERROR_HARDENING_PLAN.md
      - docs/planning/RULE_REFRESH_HANDSHAKE_PLAN.md
  - id: kit-as-os
    status: active
    title: Kit as OS architecture direction
    rationale: >-
      Evolve agentic-project-kit from a single-repository toolkit into a
      governed repository operating layer with explicit workspace, resolver,
      manifest, handoff, rule, and gate contracts.
    evidence:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
      - docs/planning/KIT_AS_OS_MASTERPLAN.md
    source_files:
      - docs/planning/KIT_AS_OS_MASTERPLAN.md
  - id: professional-single-user-tool
    status: active
    title: Professional single-user governance target
    rationale: >-
      Keep the kit focused on a professional, local, single-user operating
      surface: clear command layers, safe defaults, explicit handoff state,
      visible governance, and a future GUI that orchestrates deterministic
      wrappers rather than becoming a second command system.
    source_files:
      - docs/planning/PRE_GUI_HARDENING_TASKS.md
      - docs/planning/GUI_GATEKEEPER_IMPLEMENTATION_INVENTORY.md
      - docs/planning/TKINTER_WORKBENCH_GUI_PLAN.md
  - id: python-backed-portable-workflows
    status: active
    title: Python-backed portable workflow control
    rationale: >-
      Critical workflow, transfer, release, and evidence behavior belongs in
      portable Python-backed commands, state models, and tests; shell snippets,
      raw GitHub operations, and chat-only discipline are fallback lanes, not
      canonical execution.
    source_files:
      - docs/planning/V0.4.0_PORTABLE_LLM_COMMUNICATION_BOOTSTRAP_PLAN.md
      - docs/planning/NO_COPY_NS_WORKFLOW_CONTROL.md
      - docs/planning/REMOTE_TRANSFER_STATE_MACHINE_HARDENING_PLAN.md
      - docs/planning/NS_COMMAND_MIGRATION_CLASSIFICATION.md
  - id: machine-readable-governance
    status: active
    title: Machine-readable documentation, rule, and artifact governance
    rationale: >-
      Durable project knowledge should move from scattered prose into
      validated registries, lifecycle-aware documents, generated projections,
      and machine-readable contracts while preserving human-readable
      orientation.
    source_files:
      - docs/planning/DOC_REGISTRY_SCOPE_DECISION.md
      - docs/planning/RULE_REGISTRY_ARCHITECTURE.md
      - docs/planning/RULE_REGISTRY_IMPROVEMENT_PLAN.md
      - docs/planning/RULE_SOURCE_VALIDATOR_JSON_CONTRACT.md

