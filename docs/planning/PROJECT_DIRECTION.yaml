      - docs/planning/POST_V042_STANDARD_ERROR_HARDENING_PLAN.md
      - docs/planning/WORKFLOW_REDUCTION_FOCUS.md
  - id: workflow-kernel-and-transfer-hardening
    phase: pre-GUI
    status: planned
    title: Harden next-turn, transfer, branch, PR, evidence, and remote state-machine workflows
    depends_on:
      - pre-gui-hardening-line
    acceptance:
      - Work-order execution records command identity, branch, head, evidence, and next safe action.
      - Remote transfer paths fail closed on stale, mismatched, or unreachable state.
      - Protected diff, command reference, and evidence publication remain wrapper-driven.
    source_files:
      - docs/planning/NEXT_TURN_WORK_ORDER_WORKFLOW_PLAN.md
      - docs/planning/REMOTE_TRANSFER_STATE_MACHINE_HARDENING_PLAN.md
      - docs/planning/RULE_REFRESH_HANDSHAKE_PLAN.md
      - docs/planning/TRANSFER_GITHUB_ACTION_COVERAGE.md
  - id: release-and-doi-governance
    phase: pre-GUI
    status: planned
    title: Keep release metadata, publish, and DOI closeout behind authoritative commands
    depends_on:
      - pre-gui-hardening-line
    acceptance:
      - Release preparation and publish behavior remains fail-closed and Python-backed.
      - DOI closeout uses verified release metadata before write mode.
      - Legacy shell shortcut plans are either completed, superseded, or deleted in cleanup.
    source_files:
      - docs/planning/RELEASE_COMMAND_AUTHORITY_SLICE.md
      - docs/planning/NS_RELEASE_SHORTCUTS.md
      - docs/planning/WORKFLOW_REDUCTION_FOCUS.md
  - id: gui-gatekeeper-workbench
    phase: GUI
    status: planned
    title: Build the local gatekeeper/workbench GUI over deterministic actions
    depends_on:
      - pre-gui-hardening-line
      - workflow-kernel-and-transfer-hardening
    acceptance:
      - Buttons map to known action specs and capability checks.
      - Mutating actions remain disabled or guarded until their backend wrapper is safe.
      - GUI state mirrors command, rule, handoff, evidence, and project-direction state.
    source_files:
      - docs/planning/GUI_GATEKEEPER_IMPLEMENTATION_INVENTORY.md
      - docs/planning/TKINTER_WORKBENCH_GUI_PLAN.md
  - id: documentation-artifact-governance-os
    phase: governance
    status: planned
    title: Convert document, artifact, evidence, and policy control into lifecycle-aware governance
    depends_on:
      - p1-planning-consolidation
    acceptance:
      - Registry scope is explicit.
      - Required lifecycle headers and source-of-truth relationships are checkable.
      - Artifact retention and local-leak filters do not become semantic planning mechanisms.
    source_files:
      - docs/planning/DOC_REGISTRY_SCOPE_DECISION.md
      - docs/planning/RULE_REGISTRY_ARCHITECTURE.md
      - docs/planning/RULE_REGISTRY_IMPROVEMENT_PLAN.md

