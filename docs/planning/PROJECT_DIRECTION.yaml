- id: governed-operating-model
  status: active
  title: Governed operating model
  rationale: Prefer deterministic wrappers, machine-checked gates, repo-backed evidence,
    and explicit planning authority over raw shell, implicit chat memory, duplicated
    workflow logic, or manually maintained status fragments.
  evidence:
  - docs/architecture/ARCHITECTURE_CONTRACT.md
  - docs/archive/KIT_AS_OS_MASTERPLAN.md
  source_files:
  - docs/planning/PROJECT_DIRECTION.yaml
