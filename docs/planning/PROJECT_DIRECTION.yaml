    purpose: Preserve the governed rule registry architecture proposal without keeping
      a separate planning note. The proposal exists to prevent active rules from being
      lost when prose-heavy control files are shortened, reorganized, or refreshed
      manually.
    target_design:
      canonical_rule_location: .agentic/rules/
      proposed_modules:
      - 000-core.yaml
      - 100-communication.yaml
      - 200-evidence.yaml
      - 300-terminal.yaml
      - 400-remote-git.yaml
      - 500-release.yaml
      - 600-gui.yaml
      - 700-documentation.yaml
      rule_fields:
      - stable id
      - English normative text
      - status
      - category
      - priority
      - scope
      - enforcement references
      - projection targets
      - dependencies
      - conflicts
      - migration metadata
    required_properties:
    - small reviewable connector-friendly YAML modules
    - machine-readable active rules instead of Markdown-only prose
    - English-only persistent active project rules
    - deterministic tests, guards, or generator checks for critical and required rules
    - complete registry representation before rendering into projections
    - non-lossy obsolete or migrated rule metadata
    - dependency and conflict validation across the registry
    - projection-based STATUS.md, CURRENT_HANDOFF.md, and successor prompts
    planned_cli:
    - agentic-kit rules check
    - agentic-kit rules render --check
    - agentic-kit rules diff
    - agentic-kit rules audit
    initial_migration_boundary: The first implementation slice migrates active rules
      currently protected by .agentic/rule_preservation.yaml into the modular registry.
      It must not perform broad documentation migration and must not modify release,
      tag, or DOI state.
