          central_target: docs/planning/PROJECT_DIRECTION.yaml
          retained_as: idea candidate with advisory boundary, guidance questions, gate separation, and Pattern Advisor boundary
        - path: docs/ideas/GOVERNED_WORKFLOW_PATTERNS.md
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          retained_as: accepted design principles for event evidence, capability matrices, ADR policy, and state-model templates
        - path: docs/ideas/LAYERED_CLI_USABILITY.md
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          retained_as: candidate CLI usability model with daily, guided, maintainer, and debug layers
        - path: docs/ideas/PATTERN_ADVISOR.md
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          retained_as: candidate advisory pattern catalog concept with non-goals, MVP, lifecycle, implementation preferences, and ADR triggers
      package_2a_removed_sources:
        - path: docs/planning/NS_RELEASE_SHORTCUTS.md
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          original_status: active
          original_decision_status: proposed
          removal_reason: obsolete ns command planning; active release authority moved to agentic-kit commands
          retained_information:
            purpose: >-
              Legacy note for automating release preparation, release gates, and
              guarded publishing through old ./ns command paths.
            current_decision: >-
              The note is not active authority. Release and post-release work
              must use tested agentic-kit release, transfer, handoff, and
              post-merge commands.
            migration_rule: >-
              Before GUI implementation, any remaining release shortcut that
              points primarily to ./ns must be replaced by an agentic-kit command
              path or explicitly deprecated.
            discarded_authority: >-
              Placeholder TODO sections in the old document are not retained as
              project knowledge.
        - path: docs/planning/NS_UP_PR_COMPLETION.md
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          original_status: superseded
          original_decision_status: superseded
          removal_reason: obsolete ns PR-completion route; replaced by transfer command family
          retained_information:
            superseded_by: agentic-kit transfer pr-complete
            removed_legacy_module: agentic_project_kit.ns_up_pr_completion
            current_decision: >-
              Active PR lifecycle work must use agentic-kit transfer
              pr-create-complete, pr-complete, post-merge-complete,
              post-merge-check, and related bounded wrappers.
            prohibition: >-
              The old ns up route is no longer a supported runtime path. Do not
              reintroduce agentic_project_kit.ns_up_pr_completion; put missing
              behavior into the transfer command family.
      package_2b_removed_sources:
        - path: docs/planning/PERSISTENT_HANDOFF_STATE.md
          status: removed_source
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          implementation_status: largely_absorbed
          retained_information:
            purpose: >-
              Repository-backed handoff state prevents future chats, agents, and
              cockpit views from reconstructing project state from conversation
              memory.
            current_form: >-
              The original read-only handoff-state idea has been absorbed into
              persistent handoff state, successor-package projections, generated
              bootstrap prompts, validation reports, source manifests, and
              execution contracts.
            retained_requirements:
              - future chats must not reconstruct project state from chat memory
              - active, superseded, and historical rule lifecycle states stay distinct
              - generated prompts must not include superseded or historical rules as binding instructions
              - handoff checks reject missing critical fields, duplicate active rule ids, and contradictory first instructions
              - GUI mutation controls must wait for stable state and parameterized action objects
        - path: docs/planning/IDEMPOTENT_FINALIZATION_GUARD.md
          status: removed_source
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          implementation_status: partially_implemented_hardening_requirement
          retained_information:
            goal: >-
              Remove recurring non-semantic FAIL states from finalization,
              documentation, and governed workflow slices.
            recurring_failure_classes:
              - finalization branch already exists
              - target documentation marker already exists
              - no staged changes after an idempotent patch
              - pull request creation attempted with no commits between base and head
              - direct commit to main during documentation-only state updates
              - fragile quote-heavy patch scripts failing before intended patch
              - new documents missing required lifecycle headers
              - wrapper commit paths failing on already staged deletions or missing pathspecs
            required_behavior:
              - existing target marker on main reports PASS without creating a branch
              - existing branch containing target commit is selected deterministically
              - no diff after patching is PASS only when the target marker exists
              - never create a PR when head and base have no commit difference
              - never commit directly to main for feature or finalization slices
              - new Markdown documents include required lifecycle/status headers immediately
              - patch generation uses shell-simple file writing or stable line-based scripts instead of quote-fragile inline Python
              - delete-heavy packages are handled by wrappers without forcing native git commit exceptions
            central_followup: >-
              This remains a workflow-kernel hardening requirement until the
              wrapper lifecycle handles idempotent finalization, staged deletes,
              no-op diffs, and already-existing branch/marker states without
              false BLOCK/FAIL results.
        - path: docs/planning/PATCH_ARTIFACT_PREFLIGHT_SLICE.md
          status: removed_source
          central_target: docs/planning/PROJECT_DIRECTION.yaml
          implementation_status: partially_implemented_preflight_requirement
          retained_information:
            purpose: >-
              Stop complex shell-generated patch blocks from damaging Python,
              YAML, Markdown, coverage files, or terminal result contracts.
            principle: Prefer deterministic preflight over fast patching.
            required_checks:
              - patch scripts pass Python syntax checks before execution
              - generated or changed Python files pass py_compile before full gates
              - governance YAML files parse before and after mutation
              - documentation coverage terms remain strings
              - terminal logs satisfy the mandatory final SUMMARY contract
              - GitHub CLI JSON fields are not guessed; supported fields such as state, mergedAt, mergeCommit, and url are used
              - no inner FAIL is relabeled as OVERALL RESULT PASS
            non_goals:
              - no GUI work from this requirement alone
              - no release work from this requirement alone
              - no broad workflow rewrite from this requirement alone
            central_followup: >-
              This remains a pre-GUI hardening requirement until deterministic
              patch/preflight checks cover script syntax, generated-file
