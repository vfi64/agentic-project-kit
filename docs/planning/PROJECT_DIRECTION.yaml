      retained_information:
        goal: Remove recurring non-semantic FAIL states from finalization, documentation,
          and governed workflow slices.
        recurring_failure_classes:
        - finalization branch already exists
        - target documentation marker already exists
        - no staged changes after an idempotent patch
        - pull request creation attempted with no commits between base and head
        - direct commit to main during documentation-only state updates
        - fragile quote-heavy patch scripts failing before intended patch
        - new documents missing required lifecycle headers
        - wrapper commit paths failing on already staged deletions or missing pathspecs
        required_behavior:
        - existing target marker on main reports PASS without creating a branch
        - existing branch containing target commit is selected deterministically
        - no diff after patching is PASS only when the target marker exists
        - never create a PR when head and base have no commit difference
        - never commit directly to main for feature or finalization slices
        - new Markdown documents include required lifecycle/status headers immediately
        - patch generation uses shell-simple file writing or stable line-based scripts
          instead of quote-fragile inline Python
        - delete-heavy packages are handled by wrappers without forcing native git
          commit exceptions
        central_followup: This remains a workflow-kernel hardening requirement until
          the wrapper lifecycle handles idempotent finalization, staged deletes, no-op
          diffs, and already-existing branch/marker states without false BLOCK/FAIL
          results.
