  status: done
  title: Instruction lint gate
  completed_by_pr: 1811
  depends_on:
  - command-for-selector
  rationale: >-
    Reject unsafe or stale instruction payloads before transfer apply can execute
    them. Engine and GUI lint integration shipped in PR #1811, direction closeout
    in PR #1813, transfer apply gating in PR #1817, and apply-gate test closure
    in PR #1819.
  source_files:
  - docs/planning/MASTER_IMPLEMENTATION_Q.md
  evidence:
  - tests/test_instruction_lint_gate.py
  - tests/test_transfer_cli.py
  - tests/test_gui_task_editor.py
  - tests/test_v040_gui_tkinter_shell.py
  - tests/test_transfer_runner.py
  - tests/test_transfer_local_runner.py
  - agentic-kit instruction lint --stdin --json
  acceptance:
  - instruction lint JSON and text output classify ACK, RAW_REPLACED, UNKNOWN_SUBCOMMAND,
    UNKNOWN_RAW, and DESTRUCTIVE_NO_DRYRUN findings.
  - Transfer apply blocks BLOCKED lint results, logs WARN lint results, and continues
    on non-blocking findings.
