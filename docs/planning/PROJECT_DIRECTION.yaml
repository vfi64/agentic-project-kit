  - id: p2-workspace-manifest-followup
    phase: P2
    status: done
    title: Continue workspace manifest and schema-gated operating model work
    completed_by_pr: 1723
    merge_commit: 387b680d
    depends_on:
      - p1-planning-consolidation
    acceptance:
      - Manifest, resolver, and workspace adoption behavior remain architecture-governed.
      - Planning authority stays in project direction instead of scattered Markdown plans.
    evidence:
      - PR #1723 parsed workspace manifests with the schema gate.
    source_files:
      - docs/planning/KIT_AS_OS_MASTERPLAN.md
  - id: p3-workspace-adopt-init-upgrade
    phase: P3
    status: next
    title: Add workspace adopt, init, and upgrade lifecycle commands
    depends_on:
      - p2-workspace-manifest-followup
    acceptance:
      - workspace adopt analyzes an existing repository without writing.
      - workspace init creates the .agentic workspace with dry-run default and CI templates.
      - workspace upgrade provides the deterministic schema-migration frame.
      - CI injection remains an explicit opt-in exception.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: p4-namespace-completion
    phase: P4
    status: planned
    title: Complete namespace resolution for manifest-bearing projects
    depends_on:
      - p3-workspace-adopt-init-upgrade
    acceptance:
      - Registries resolve into .agentic for manifest-bearing projects.
      - Status, rules, and tmp paths resolve through the workspace resolver.
      - Legacy profile behavior remains unchanged for manifest-less repositories.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: p5a-self-hosting-manifest
    phase: P5
    status: planned
    title: Add a self-hosting manifest while keeping physical paths stable
    depends_on:
      - p4-namespace-completion
    acceptance:
      - The kit repository gains a manifest without physical path moves.
      - Existing public paths and generated projections remain stable.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: p5b-resolver-aliases
    phase: P5
    status: planned
    title: Route self-hosted accesses through resolver-backed aliases
    depends_on:
      - p5a-self-hosting-manifest
    acceptance:
      - Kit-repo access uses the resolver while physical paths remain stable.
      - Tests cover alias behavior before any physical migration.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: p5c-physical-migration
    phase: P5
    status: planned
    title: Optionally migrate physical paths after resolver decoupling
    depends_on:
      - p5b-resolver-aliases
    acceptance:
      - Physical migration starts only after references, docs, and tests are resolver-based.
      - Public surfaces may remain projections instead of being moved.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: p5d-legacy-path-deprecation
    phase: P5
    status: planned
    title: Deprecate legacy top-level paths in line with legacy-profile removal
    depends_on:
      - p5c-physical-migration
    acceptance:
      - Legacy top-level path deprecation is explicit and reviewable.
      - The timing aligns with the 2.0.0 removal of the implicit legacy profile.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: p6-gui-project-selection-and-ci-recipe
    phase: P6
    status: planned
    title: Add GUI project selection and harden CI recipe follow-ups
    depends_on:
      - p5d-legacy-path-deprecation
    acceptance:
      - The GUI can operate on a selected workspace root.
      - Initial prompts are parameterized per workspace.
      - CI recipes are hardened after the workspace lifecycle commands exist.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: v1-0-milestone
    phase: unphased
    status: planned
    title: Reach the 1.0 operating-layer stability milestone
    depends_on:
      - p6-gui-project-selection-and-ci-recipe
    acceptance:
      - The self-hosting litmus has passed.
      - workspace adopt/init is stable on at least one real external project.
      - Too-old and too-new kit_schema_version failure paths are tested.
      - A tested workspace upgrade transformation exists before or with the first schema bump.
    source_files:
      - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - id: v2-0-legacy-profile-removal
    phase: unphased
    status: planned
    title: Remove the implicit legacy profile in 2.0.0
    depends_on:
