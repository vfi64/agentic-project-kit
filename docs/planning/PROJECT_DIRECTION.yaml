- id: workflow-kernel-and-transfer-hardening
  phase: pre-GUI
  status: planned
  title: Harden next-turn, transfer, branch, PR, evidence, and remote state-machine
    workflows
  depends_on:
  - pre-gui-hardening-line
  acceptance:
  - Work-order execution records command identity, branch, head, evidence, and next
    safe action.
  - Remote transfer paths fail closed on stale, mismatched, or unreachable state.
  - Protected diff, command reference, and evidence publication remain wrapper-driven.
  - Transfer GitHub action coverage remains explicit for read, create/update, branch,
    PR, and workflow-run operations.
  - Any future GitHub connector action is classified before being treated as supported
    workflow authority.
  - Transfer-state MVP validates exactly one active command, inbox/outbox correlation,
    stale results, duplicate active files, remote drift, and unreachable remotes.
  - Transfer status outputs expose machine-readable STATE and NEXT values without
    prose parsing.
  preserved_information:
    removed_sources:
    - path: docs/planning/TRANSFER_GITHUB_ACTION_COVERAGE.md
      status: removed_source
      central_target: docs/planning/PROJECT_DIRECTION.yaml
    - path: docs/planning/REMOTE_TRANSFER_STATE_MACHINE_HARDENING_PLAN.md
      status: removed_source
      central_target: docs/planning/PROJECT_DIRECTION.yaml
    original_status: active
    original_decision_status: proposed
    purpose: Preserve transfer GitHub action coverage and remote transfer state-machine
      hardening requirements without keeping separate planning documents. The preserved
      state-machine plan classified how the transfer layer should correlate active
      inbox commands, outbox results, repository branch/head state, command identity,
      and transient remote failures.
    coverage_principle: The GUI and LLM workflow must not call raw GitHub APIs as
      project authority. Supported GitHub operations need explicit agentic-kit command
      wrappers, safety classification, evidence output, and tests.
    transfer_state_model:
      allowed_states:
      - NO_COMMAND
      - COMMAND_READY
      - COMMAND_RUNNING
      - RESULT_READY
      - STALE_RESULT
      - CONFLICT
      - REMOTE_DRIFT
      - REMOTE_UNREACHABLE
      - BLOCKED
      state_contract: Every transfer state must include a deterministic NEXT value
        such as consume_result, ignore_or_archive_stale_result, retry_remote_check_later,
        or sync_or_regenerate_command.
      command_metadata:
      - command_id
      - created_at_utc
      - command_kind
      - expected_branch
      - expected_head
      - expected_origin_main
      - input_hash
      result_metadata:
      - command_id
      - finished_at_utc
      - result_status
      - observed_branch
      - observed_head
      - observed_origin_main
      - output_hash
      validation_rules:
        exactly_one_command:
        - zero or one active inbox command is allowed
        - more than one active command reports CONFLICT
        - no active command and no active result reports NO_COMMAND
        inbox_outbox_correlation:
        - inbox and outbox command_id values must match
        - unmatched outbox results are stale or already consumed
        - command_id mismatch reports STALE_RESULT or CONFLICT
        stale_last_result:
        - command_id mismatch
        - observed head incompatible with expected command head
        - finished_at_utc predates active command creation
        - result produced for a different branch
        - input_hash mismatch
        duplicate_active_files:
        - active inbox/outbox locations may contain only canonical active files
        - unknown tmp, bak, old, duplicate command, or duplicate result files in active
          locations report CONFLICT
        remote_drift:
        - local_branch must equal expected_branch
        - local_head must equal expected_head
        - origin_main must equal expected_origin_main
        - mismatch reports REMOTE_DRIFT with NEXT=sync_or_regenerate_command
        remote_unreachable:
        - failed SSH/GitHub/fetch/push/ls-remote checks are not success
        - no later mutation may occur after failed remote preflight
        - same command_id can remain reusable for safe retry
        - remote verification is required after push, PR creation, merge, or fetch-sensitive
          operations
      implementation_slices:
      - id: transfer_metadata_schema_and_parser
        acceptance:
        - malformed metadata is rejected
        - missing command_id is rejected
        - command/result metadata can be parsed without executing payload
      - id: inbox_outbox_correlation_check
        acceptance:
        - matching command/result returns RESULT_READY
        - mismatched command/result returns STALE_RESULT
        - duplicate active files return CONFLICT
      - id: stale_last_result_detection
        acceptance:
        - old last_result after new inbox command is not accepted
        - stale result includes reason and NEXT
      - id: remote_drift_preflight
        acceptance:
        - mismatched local head blocks execution
        - mismatched origin/main blocks execution
        - sync/regenerate command is allowed only when explicit
      - id: remote_unreachable_classification
        acceptance:
        - failed remote operations are not treated as success
        - no later mutation occurs after a remote preflight failure
        - output says retry is safe
      - id: roadmap_gate_before_ns_replacement
        acceptance:
        - roadmap names transfer-state hardening as first dependency
        - ns replacement section references this gate
        - no ns replacement slice starts before the gate is green
      mvp_definition_of_done:
      - exactly-one-command validation is tested
      - inbox/outbox command-id correlation is tested
      - stale last_result is tested
      - duplicate active transfer file detection is tested
      - remote-vs-local drift blocks mutable execution
      - remote-unreachable state is represented distinctly
      - post-merge-check, repo-status, and transfer status outputs can be consumed
        without prose parsing
      - protected-diff-plan passes
      - docs-audit passes
    covered_or_governed_action_families:
      repository_status:
        examples:
        - get repository metadata
        - compare local and remote branch/head status
        - inspect clean/dirty worktree before mutation
        authority: agentic-kit transfer repo-status and related post-merge checks
        status: covered_by_transfer_wrappers
      branch_operations:
        examples:
        - create feature branch from fresh main
        - push current branch
        - ensure remote head before PR creation
        authority: agentic-kit transfer remote-work-start, push-current, pr-create-complete
        status: covered_or_wrapper_required_before_mutation
      pull_request_lifecycle:
        examples:
        - create PR
        - complete PR
        - post-merge completion
        - post-merge check
        authority: agentic-kit transfer pr-create-complete, pr-complete, post-merge-complete,
          post-merge-check
        status: covered_by_transfer_wrappers
      file_transfer_carrier:
        examples:
        - transfer inbox current.yaml
        - transfer outbox last_result
        - gui-transfer-tasks ref
        authority: file-transfer protocol and transfer commands
        status: covered_with_mode_dependent_visibility
      workflow_and_ci_observation:
        examples:
        - observe run status
        - fetch concise evidence
        - avoid dumping long logs into chat
        authority: wrapper evidence logs and bounded summaries
        status: supported_as_read_or_evidence_path_only
      release_and_doi_operations:
        examples:
        - prepare release metadata
        - publish release
        - DOI closeout
        authority: release command family and explicit maintainer-gated workflows
        status: not_raw_github_action_authority
    unsupported_or_guarded_patterns:
    - raw PR creation without branch/head/dirty-state checks
    - raw merge or release publication without post-merge or release evidence
    - direct GitHub file mutations as a substitute for local protected diff workflow
    - long workflow-log dumps into chat
    - connector or GUI bypass of command reference, rule acknowledgement, or protected-diff-plan
    future_rule: Before a GUI button, workflow kernel step, release helper, or transfer
      command depends on a GitHub action, the action must have a documented wrapper
      path, safety class, failure behavior, evidence output, and regression coverage.
  source_files:
  - docs/planning/PROJECT_DIRECTION.yaml
