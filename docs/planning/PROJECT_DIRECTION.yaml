- id: kit-as-os
  status: active
  title: Kit as OS architecture direction
  rationale: Evolve agentic-project-kit from a single-repository toolkit into a governed
    repository operating layer with explicit workspace, resolver, manifest, handoff,
    rule, and gate contracts.
  evidence:
  - docs/architecture/KIT_AS_OS_ARCHITECTURE.md
  - docs/archive/KIT_AS_OS_MASTERPLAN.md
  source_files:
  - docs/archive/KIT_AS_OS_MASTERPLAN.md
- id: professional-single-user-tool
  status: active
  title: Professional single-user governance target
  rationale: 'Keep the kit focused on a professional, local, single-user operating
    surface: clear command layers, safe defaults, explicit handoff state, visible
    governance, and a future GUI that orchestrates deterministic wrappers rather than
    becoming a second command system.'
  source_files:
  - docs/archive/PRE_GUI_HARDENING_TASKS.md
  - docs/reference/GUI_GATEKEEPER_IMPLEMENTATION_INVENTORY.md
  - docs/archive/TKINTER_WORKBENCH_GUI_PLAN.md
- id: python-backed-portable-workflows
  status: active
  title: Python-backed portable workflow control
  intent: Prefer bounded, tested agentic-kit commands and future GUI cockpit actions
    over long chat-to-terminal copy-and-paste blocks and over active ./ns workflow
    control.
  preserved_information:
    removed_source:
      path: docs/planning/NO_COPY_NS_WORKFLOW_CONTROL.md
      status: removed_source
      central_target: docs/planning/PROJECT_DIRECTION.yaml
    original_status: active
    original_decision_status: proposed
    original_scope: unify ./ns no-copy workflow control with future GUI cockpit action
      model
    retained_context:
    - Long Chat-provided shell blocks are error-prone and contradict the no-copy goal.
    - .agentic/current_work.yaml must not be repurposed as free-form slice scratch
      state.
    - Terminal workflow must not diverge from the future GUI cockpit action model.
    - New actions should be documented as future GUI cockpit candidates rather than
      hidden shell-only behavior.
    - Multi-step local actions should expose explicit PASS/FAIL style result markers.
    command_coverage:
    - legacy_or_old_form: long chat-generated shell block
      retained_requirement: expose bounded, copy-safe, evidence-producing workflow
        actions
      current_authority:
      - agentic-kit transfer continue
      - agentic-kit transfer run-and-log
      - agentic-kit transfer workflow-next
      - agentic-kit docs removed-source-audit
      replacement_status: partially_replaced_by_bounded_agentic_kit_commands
    - legacy_or_old_form: ./ns local workflow controller
      retained_requirement: avoid divergence between terminal workflow and future
        GUI cockpit action model
      current_authority:
      - agentic-kit command-taxonomy-check
      - agentic-kit gui-readiness-gate
      - future GUI cockpit buttons backed by agentic-kit commands
      replacement_status: superseded_by_agentic_kit_command_contracts_and_future_gui
    migration_decision: The old proposal to make ./ns the primary local workflow controller
      is superseded by Python-backed agentic-kit command families and the planned
      GUI cockpit action model. Remaining ./ns references must be classified as legacy,
      compatibility-only, obsolete, or replaced by tested agentic-kit commands before
      GUI integration.
    before_gui_requirements:
    - classify every remaining ./ns reference as active, legacy, compatibility, or
      obsolete
    - replace active workflow instructions with tested agentic-kit commands
    - keep any remaining ./ns mention explicitly labeled as legacy or compatibility-only
    - keep GUI action candidates aligned with command contracts and evidence output
    evidence_expectations:
    - python -m pytest -q
    - ruff check .
    - agentic-kit check-docs or current documentation gates
    - agentic-kit doctor or current health checks
    - agentic-kit pr-hygiene or current PR lifecycle checks
  source_files:
  - docs/planning/PROJECT_DIRECTION.yaml
