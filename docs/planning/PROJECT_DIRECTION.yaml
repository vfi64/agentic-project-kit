ideas:
  - id: project-direction-gui-panel
    status: accepted
    title: Project direction panel
    rationale: >-
      A future GUI can render strategy, roadmap, plans, ideas, done, and
      discarded decisions from the machine-readable direction source.
    decision_needed: false
    source_files:
      - docs/planning/PROJECT_DIRECTION.yaml
  - id: deterministic-gui-gatekeeper
    status: accepted
    title: Deterministic GUI gatekeeper
    rationale: >-
      GUI workflow should expose safe wrappers, readiness checks, guided work
      cycle state, communication-mode examples, and project direction without
      raw shell execution or duplicate workflow logic.
    decision_needed: false
    source_files:
      - docs/planning/PROJECT_DIRECTION.yaml
  - id: live-release-gui
    status: candidate
    title: Live release publish from GUI
    rationale: >-
      Live publication may become useful after core workflow controls are
      stable, but it must remain capability-gated and separate from early GUI
      phases.
    decision_needed: true
    source_files:
      - docs/planning/PROJECT_DIRECTION.yaml
  - id: deterministic-cell-orchestration
    status: candidate
    title: Deterministic Cell Orchestration
    rationale: >-
      DCO remains a candidate pattern for complex generated artifacts where
      typed cells, validation, selective repair, and deterministic rendering
      reduce drift without making simple workflows harder.
    decision_needed: true
    source_files:
      - docs/ideas/DETERMINISTIC_CELL_ORCHESTRATION.md
  - id: governed-workflow-patterns
    status: accepted
    title: Governed workflow patterns
    rationale: >-
      Explicit state models, contract-first commands, idempotency, stop states,
      typed intermediate artifacts, bounded repair, and capability matrices are
      accepted design principles when they reduce workflow drift and improve
      restartability.
    decision_needed: false
    source_files:
      - docs/ideas/GOVERNED_WORKFLOW_PATTERNS.md
  - id: layered-cli-usability
    status: candidate
    title: Layered CLI usability model
    rationale: >-
      Keep the daily command surface simple while preserving guided,
      maintainer, and debug layers for advanced workflow, release, audit, and
      evidence needs.
    decision_needed: true
    source_files:
      - docs/ideas/LAYERED_CLI_USABILITY.md
  - id: didactic-guidance
    status: candidate
    title: Didactic guidance layer
    rationale: >-
      Human-facing explanations can make state, handoffs, gates, workflow
      requests, and safe next steps easier to understand, but should remain
      advisory unless converted into tested commands or coverage rules.
    decision_needed: true
    source_files:
      - docs/ideas/DIDACTIC_GUIDANCE.md
  - id: pattern-advisor
    status: candidate
    title: Pattern Advisor
    rationale: >-
      A small advisory pattern catalog or CLI may later help choose between
      documented governance patterns, but it must stay bounded and never replace
      deterministic gates.
    decision_needed: true
    source_files:
      - docs/ideas/PATTERN_ADVISOR.md

