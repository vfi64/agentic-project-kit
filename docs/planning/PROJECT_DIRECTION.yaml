    phase: governance
    status: planned
    title: Convert document, artifact, evidence, and policy control into lifecycle-aware governance
    depends_on:
      - p1-planning-consolidation
    acceptance:
      - Registry scope is explicit.
      - Required lifecycle headers and source-of-truth relationships are checkable.
      - Artifact retention and local-leak filters do not become semantic planning mechanisms.
    source_files:
      - docs/planning/DOC_REGISTRY_SCOPE_DECISION.md
      - docs/planning/RULE_REGISTRY_ARCHITECTURE.md
      - docs/planning/RULE_REGISTRY_IMPROVEMENT_PLAN.md

