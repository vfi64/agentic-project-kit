    acceptance:
      - Workflow and PR lifecycle wrappers remain the normal path.
      - Failure classes are converted into tests, gates, or state transitions.
      - GUI work starts only from bounded command contracts and clean evidence paths.
    source_files:
      - docs/planning/PRE_GUI_HARDENING_TASKS.md
      - docs/planning/COMMAND_SAFETY_HARDENING_PLAN.md
      - docs/planning/FAILURE_MODE_REVIEW_AUTOMATION_PLAN.md
      - docs/planning/IDEMPOTENT_FINALIZATION_GUARD.md
