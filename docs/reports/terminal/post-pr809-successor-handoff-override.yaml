post_pr809_successor_handoff_override:
  repo: "vfi64/agentic-project-kit"
  rule: "Do not work from chat memory. Read repo/remote sources first."

  required_start:
    - "Read docs/handoff/NEXT_CHAT_BOOTSTRAP.md fully."
    - "Run or read output from .venv/bin/agentic-kit handoff prompt."
    - "Treat generated handoff/status state as potentially stale until verified against the override below."

  last_clean_remote_anchor:
    commit: "ee87fa57ed9372c758e68770478b5783878b506d"
    subject: "Record PR809 finalize-log recovery evidence"
    evidence_log: "docs/reports/terminal/pr809-merge-finalize-summary-recovery.log"
    required_check:
      - "Read the evidence log directly from main."
      - "Run agentic-kit evidence inspect --require-summary against the log when local repo is available."

  pr_state:
    pr808:
      status: "merged"
      meaning:
        - "agentic-kit evidence finalize-log prints the canonical summary visibly."
        - "Invalid summary semantics are rejected."
    pr809:
      status: "merged"
      merge_commit: "02bacce54bdc9fd9936fd381d40a7db82bf12924"
      recovery_commit: "ee87fa57ed9372c758e68770478b5783878b506d"
      meaning:
        - "protected_change_planner blocks broad protected-file rewrites."
        - "protected_change_planner is registered through patch-preflight."

  superseded_bad_evidence:
    bad_log: "docs/reports/terminal/pr809-merge-finalize-summary.log"
    reason:
      - "Summary rendering rejected PASS with remote-evidence PARTIAL."
      - "The rejected/ambiguous log was committed accidentally."
      - "It must not be used as success evidence."
    superseded_by: "docs/reports/terminal/pr809-merge-finalize-summary-recovery.log"

  local_state_at_chat_switch:
    branch: "post-pr809-status-handoff-refresh"
    dirty_paths_before_closeout:
      - "docs/STATUS.md"
      - "docs/handoff/CURRENT_HANDOFF.md"
    required_first_action:
      - "Inspect local branch and git status."
      - "Inspect or verify any remaining local diff."
      - "Do not assume local main is clean."

  process_constraints:
    - "No long freehand shell monoliths for mutation, evidence, merge, status, or handoff."
    - "Prefer ./ns, agentic-kit, and registered repo actions."
    - "Before commits touching protected files, inspect actual git diff and run protected-change-plan."
    - "If protected-change-plan reports BLOCK or any gate reports FAIL, stop immediately."
    - "No commit, push, PR, or merge after BLOCK/FAIL."
    - "Evidence-bearing workflows must close through agentic-kit evidence finalize-log or stricter successor."
    - "After closeout, run evidence inspect --require-summary against the named repo-readable log."
    - "d/f/w are communication, not evidence."

  next_goal:
    - "Finish the post-PR809 status/handoff refresh safely."
    - "If no atomic command exists for guarded status/handoff refresh, build one as a small repo-backed action before using it repeatedly."
